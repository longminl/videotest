<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频收藏工具</title>
    <link href="/lib/bootstrap-5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="/lib/bootstrap-icons-1.11.3/css/bootstrap-icons.min.css" rel="stylesheet">
    <script src="/lib/hls.js-1.5.17/hls.min.js"></script>
    <link href="/lib/plyr-3.7.8/plyr.css" rel="stylesheet">
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }

        /* 设计令牌 */
        :root {
            --c-primary: #2563eb;
            --c-primary-light: #3b82f6;
            --c-primary-dark: #1d4ed8;
            --c-gradient: linear-gradient(135deg, #4f46e5, #3b82f6);
            --c-ok: #10b981;
            --c-err: #ef4444;
            --c-mute: #94a3b8;
            --c-warn: #ca8a04;
            --t-title: 24px;
            --t-sub: 15px;
            --t-body: 14px;
            --t-small: 13px;
            --t-xs: 12px;
            --s-1: 8px;
            --s-2: 16px;
            --s-3: 24px;
            --s-4: 32px;
            --s-5: 40px;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }
        .app-container { max-width: 1320px; margin: 0 auto; padding: 24px 20px; }

        /* 顶栏 */
        .header-section {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-top: 3px solid #2563eb;
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
        }
        .header-title {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -0.3px;
        }
        .header-title i { color: #2563eb; margin-right: 10px; }
        .header-sub {
            font-size: 13px;
            color: #64748b;
            margin-top: 2px;
        }

        /* 输入框区域 */
        .input-glass {
            background: #ffffff !important;
            border: 1px solid #d1d5db !important;
            color: #374151 !important;
            border-radius: 12px !important;
            padding: 14px 18px !important;
            font-size: 15px !important;
            transition: all 0.25s;
        }
        .input-glass:focus {
            background: #ffffff !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15) !important;
        }
        .input-glass::placeholder { color: #94a3b8; }
        .btn-collect {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            padding: 16px 24px;
            transition: all 0.25s;
            color: #fff;
        }
        .btn-collect:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(59,130,246,0.3); }
        .btn-collect:disabled { opacity: 0.6; transform: none; }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .filter-pills {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 10px;
        }
        .filter-pill {
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-pill:hover { color: #1e293b; background: rgba(255,255,255,0.8); }
        .filter-pill.active {
            color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(59,130,246,0.15);
        }
        .filter-pill .dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .search-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .search-input {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 9px 14px;
            color: #374151;
            font-size: 13px;
            width: 200px;
            transition: all 0.2s;
        }
        .search-input:focus { outline: none; border-color: #3b82f6; background: #ffffff; }
        .search-input::placeholder { color: #94a3b8; }

        /* 表格卡片 */
        .table-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
        }
        .table-card table { margin-bottom: 0; }
        .table-card td:first-child, .table-card th:first-child {
            width: 36px; text-align: center; vertical-align: middle;
        }
        .table-card thead th {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            color: #64748b;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px 16px;
        }
        .table-card tbody td {
            border-color: #f1f5f9;
            color: #334155;
            padding: 14px 16px;
            vertical-align: middle;
            font-size: 14px;
        }
        .table-card tbody tr { transition: background 0.15s; }
        .table-card tbody tr:hover { background: rgba(59,130,246,0.04); }

        /* 标题列缩短 + 自适应列宽 */
        .table-card thead th:nth-child(3),
        .table-card tbody td:nth-child(3) {
            max-width: 200px; width: 200px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        /* 自适应列的最小宽度，避免过窄 */
        .table-card thead th:nth-child(6),
        .table-card tbody td:nth-child(6) { min-width: 70px; }
        .table-card thead th:nth-child(7),
        .table-card tbody td:nth-child(7) { min-width: 50px; }
        .table-card thead th:nth-child(8),
        .table-card tbody td:nth-child(8) { min-width: 60px; }
        .table-card thead th:nth-child(9),
        .table-card tbody td:nth-child(9) { min-width: 55px; }
        .table-card thead th:nth-child(11),
        .table-card tbody td:nth-child(11) { min-width: 120px; }
        .table-card thead th:nth-child(12),
        .table-card tbody td:nth-child(12) { min-width: 80px; white-space: nowrap; }

        .url-text, .url-link {
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            vertical-align: middle;
            color: #64748b;
            font-size: 13px;
        }
        .url-link {
            color: #3b82f6;
            text-decoration: none;
        }
        .url-link:hover {
            text-decoration: underline;
            color: #2563eb;
        }
        .latency-text { font-family: 'JetBrains Mono', monospace; color: #3b82f6; font-weight: 500; }
        .time-text { font-size: 13px; color: #94a3b8; }

        /* 状态徽章 */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pill .sd { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .status-pill::before { font-size: 11px; line-height: 1; }
        .status-pill.status-0::before { content: "⏳"; }
        .status-pill.status-1::before { content: "✅"; }
        .status-pill.status-2::before { content: "❌"; }
        .status-pill.status-3::before { content: "⚠️"; }
        .status-0 { background: rgba(148,163,184,0.08); color: #94a3b8; }
        .status-0 .sd { background: #94a3b8; }
        .status-1 { background: rgba(16,185,129,0.15); color: #10b981; }
        .status-1 .sd { background: #10b981; }
        .status-2 { background: rgba(239,68,68,0.12); color: #ef4444; }
        .status-2 .sd { background: #ef4444; }
        .status-3 { background: rgba(234,179,8,0.12); color: #ca8a04; }
        .status-3 .sd { background: #ca8a04; }

        /* 操作按钮 */
        .action-group { display: flex; flex-wrap: wrap; gap: 4px; }
        .action-group .btn-action { flex: 0 0 calc(50% - 2px); box-sizing: border-box; text-align: center; }
        .btn-action {
            background: transparent;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 13px;
            color: #64748b;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .btn-action:hover { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; }
        .btn-action.view:hover { background: rgba(59,130,246,0.08); color: #3b82f6; border-color: rgba(59,130,246,0.2); }
        .btn-action.check:hover { background: rgba(234,179,8,0.1); color: #ca8a04; border-color: rgba(234,179,8,0.2); }
        .btn-action.del:hover { background: rgba(239,68,68,0.1); color: #dc2626; border-color: rgba(239,68,68,0.2); }
        .btn-action i { font-size: 14px; }

        /* 合集栏 */
        .group-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            padding: 10px 14px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }
        .group-selector {
            display: flex;
            align-items: center;
        }
        .group-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* 分页 */
        .pagination-custom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding: 0 4px;
        }
        .page-info { font-size: 13px; color: #94a3b8; }
        .page-list { display: flex; gap: 2px; list-style: none; margin: 0; padding: 0; }
        .page-item-custom a {
            display: flex; align-items: center; justify-content: center;
            min-width: 34px; height: 34px;
            border-radius: 10px;
            font-size: 13px;
            color: #64748b;
            text-decoration: none;
            transition: all 0.15s;
            cursor: pointer;
        }
        .page-item-custom a:hover { background: #f1f5f9; color: #1e293b; }
        .page-item-custom.active a { background: #3b82f6; color: #ffffff; font-weight: 600; }
        .page-item-custom.disabled a { opacity: 0.3; cursor: default; pointer-events: none; }

        /* Toast */
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; }
        .toast-custom {
            border-radius: 12px;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            background: #ffffff !important;
            color: #1e293b !important;
            font-size: 14px;
        }
        .toast-custom .toast-body { display: flex; align-items: center; gap: 8px; }

        /* 空状态 */
        .empty-state { padding: 80px 24px; text-align: center; }
        .empty-state i { font-size: 48px; color: #94a3b8; margin-bottom: 16px; }
        .empty-state p { color: #64748b; font-size: 15px; }

        /* 加载骨架 */
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* 进度弹窗 */
        .modal-custom .modal-content {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            color: #1e293b;
        }
        .modal-custom .modal-header { border-bottom: 1px solid #e2e8f0; }
        .modal-custom .modal-footer { border-top: 1px solid #e2e8f0; }
        .modal-custom .btn-close { filter: none; }

        /* 批量检测 */
        .btn-recheck {
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: 10px;
            padding: 9px 18px;
            font-size: 13px;
            font-weight: 500;
            color: #3b82f6;
            transition: all 0.2s;
        }
        .btn-recheck:hover {
            background: rgba(59,130,246,0.15);
            color: #2563eb;
            border-color: rgba(59,130,246,0.25);
        }
        .btn-recheck i { margin-right: 4px; }

        .btn-search {
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 9px 14px;
            color: #64748b;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-search:hover { background: #f8fafc; color: #1e293b; }

        /* ===== 响应式断点 ===== */

        /* 平板及以下 */
        @media (max-width: 768px) {
            .app-container { padding: 16px 12px; }
            .header-section { padding: 18px; border-radius: 12px; }
            .header-title { font-size: 19px; }
            .filter-bar { flex-direction: column; align-items: stretch; gap: 10px; }
            .filter-pills { overflow-x: auto; flex-wrap: nowrap; }
            .filter-pill { font-size: 12px; padding: 6px 12px; white-space: nowrap; }
            .search-group { width: 100%; }
            .search-input { flex: 1; min-width: 0; width: auto; }
            .table-card { overflow-x: scroll; }
            .table-card table { min-width: 640px; }
            .table-card thead th,
            .table-card tbody td { padding: 12px 10px; font-size: 13px; }
            .url-text { max-width: 140px; }
            .action-group { flex-wrap: wrap; gap: 2px; }
            .btn-action { padding: 6px 8px; font-size: 11px; border-radius: 6px; }
            .btn-action i { font-size: 11px; }
            .btn-action .label-text { display: none; }  /* 手机端仅显示图标 */
            /* 分页紧凑 */
            .pagination-custom { flex-direction: column; gap: 8px; align-items: center; }
            .page-info { font-size: 12px; }
            /* 操作列悬浮跟随滚动 */
            .table-card thead th:nth-child(11),
            .table-card tbody td:nth-child(11) {
                position: sticky;
                right: 0;
                z-index: 1;
                background: #ffffff;
            }
            .table-card tbody td:nth-child(11) {
                box-shadow: -4px 0 12px rgba(0,0,0,0.08);
            }
            .table-card tbody tr:hover td:nth-child(11) {
                background: rgba(59,130,246,0.04);
            }
            /* 手机端列宽收窄 */
            .table-card thead th:nth-child(2),
            .table-card tbody td:nth-child(2) { width: 28px !important; min-width: 28px; }
            .table-card thead th:nth-child(3),
            .table-card tbody td:nth-child(3) { max-width: none; width: auto; }
            .table-card thead th:nth-child(4),
            .table-card tbody td:nth-child(4) { width: 50px !important; min-width: 40px; }
            .table-card thead th:nth-child(5),
            .table-card tbody td:nth-child(5) { width: 32px !important; min-width: 28px; }
            .table-card thead th:nth-child(6),
            .table-card tbody td:nth-child(6) { width: 60px !important; min-width: 50px; }
            .table-card thead th:nth-child(7),
            .table-card tbody td:nth-child(7) { width: 44px !important; min-width: 40px; }
            .table-card thead th:nth-child(8),
            .table-card tbody td:nth-child(8) { width: 55px !important; min-width: 50px; }
            .table-card thead th:nth-child(9),
            .table-card tbody td:nth-child(9) { width: 55px !important; min-width: 45px; }
            .table-card thead th:nth-child(10),
            .table-card tbody td:nth-child(10) { width: 40px !important; min-width: 36px; }
            .table-card thead th:nth-child(11),
            .table-card tbody td:nth-child(11) { width: 120px !important; min-width: 100px; }
            .table-card thead th:nth-child(12),
            .table-card tbody td:nth-child(12) { width: 80px !important; min-width: 60px; }
        }

        /* 小屏平板 */
        @media (max-width: 640px) {
            .header-title { font-size: 18px; }
            .table-card thead th,
            .table-card tbody td { font-size: 12px; padding: 8px 8px; }
            .action-group { gap: 3px; }
            .btn-action { padding: 5px 8px; font-size: 11px; }
            .search-input { font-size: 12px; padding: 7px 10px; }
        }

        /* 手机 */
        @media (max-width: 576px) {
            .app-container { padding: 12px 8px; }
            .header-section { padding: 14px; }
            .header-title { font-size: 17px; }
            .header-title i { margin-right: 6px; }
            .header-sub { font-size: 12px; }
            .input-glass { padding: 16px 20px !important; font-size: 14px !important; }
            .input-glass:focus { box-shadow: 0 0 0 4px rgba(59,130,246,0.25) !important; }
            .btn-collect { padding: 11px 14px; font-size: 14px; }
            .table-card { border-radius: 10px; }
            .table-card thead th { font-size: 11px; padding: 8px 6px; }
            .table-card tbody td { padding: 8px 6px; font-size: 12px; }
            .table-card thead th:nth-child(7),
            .table-card tbody td:nth-child(7) { display: none; }  /* 隐藏延迟列 */
            .table-card thead th:nth-child(12),
            .table-card tbody td:nth-child(12) { display: none; }  /* 隐藏收录时间 */
            .latency-text { font-size: 12px; }
            .cache-cell { font-size: 11px; }
            .cache-bar-mini .track { width: 36px; }
            .cache-bar-mini .label { font-size: 10px; }
            .status-pill { font-size: 11px; padding: 3px 8px; }
            .status-pill .sd { width: 5px; height: 5px; }
            .time-text { font-size: 11px; }
            .btn-action .label-text { display: inline; }  /* 移动端显示文字标签 */
            .action-group { gap: 4px; }
            .btn-action { padding: 6px 9px; font-size: 10px; border-radius: 5px; }
            .btn-action i { font-size: 11px; }
            /* 分页 */
            .page-item-custom a { min-width: 40px; height: 40px; font-size: 12px; }
            .page-info { font-size: 11px; }
            /* 批量检测按钮 */
            .btn-recheck { font-size: 12px; padding: 7px 12px; }
            /* 进度弹窗 */
            .modal-custom .modal-content { border-radius: 12px; }
        }

        /* 小屏手机 */
        @media (max-width: 400px) {
            .header-section { padding: 12px; }
            .header-title { font-size: 16px; }
            .filter-pill { font-size: 11px; padding: 5px 8px; }
            .table-card table { min-width: 480px; }
            .table-card thead th,
            .table-card tbody td { padding: 6px 4px; font-size: 11px; }
            .table-card thead th:nth-child(4),
            .table-card tbody td:nth-child(4) { display: none; }  /* 隐藏合集列 */
            .table-card thead th:nth-child(7),
            .table-card tbody td:nth-child(7) { display: none; }  /* 隐藏延迟列 */
            .table-card thead th:nth-child(12),
            .table-card tbody td:nth-child(12) { display: none; }  /* 隐藏收录时间 */
            .table-card thead th:nth-child(11) {
                text-indent: -9999px;
                overflow: hidden;
            }
            .status-pill { font-size: 10px; padding: 5px 12px; border-radius: 14px; }
            .action-group { gap: 6px; }
            .btn-action { padding: 6px 9px; font-size: 10px; border-radius: 6px; }
            .btn-action i { font-size: 14px; }
        }

        /* 播放模态框：手机全屏 */
        @media (max-width: 576px) {
            .modal-player .modal-dialog {
                margin: 0;
                max-width: 100%;
            }
            .modal-player .modal-content {
                border-radius: 0;
                border: none;
                min-height: 100vh;
            }
            .modal-player .modal-header {
                padding: 10px 14px;
            }
            .modal-player .modal-title {
                font-size: 14px;
            max-width: 220px;
            }
            .modal-player .plyr video { aspect-ratio: 16 / 9; }
        }

        /* 移动端性能优化 */
        .btn-action, .btn-collect, .filter-pill, .page-item-custom a,
        .input-glass, .btn-search, .btn-recheck {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        @media (max-width: 768px) {
            .toast-custom { backdrop-filter: none !important; }
            .skeleton { animation: none !important; background: #e2e8f0 !important; }
            .btn-action, .btn-collect { transition: color 0.1s, background 0.1s; }
            .header-section { box-shadow: none; }
            .cache-bar-mini .fill { transition: none; }
        }

        /* 缓存列 */
        .cache-cell { font-size: 13px; }
        .cache-bar-mini {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .cache-bar-mini .track {
            width: 50px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .cache-bar-mini .fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #22c55e);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .cache-bar-mini .label {
            font-size: 11px;
            color: #64748b;
            white-space: nowrap;
        }
        .cache-bar-mini .label .num { color: #1e293b; font-weight: 600; }

        /* 播放按钮 */
        .btn-action.play:hover { background: rgba(59,130,246,0.08); color: #3b82f6; border-color: rgba(59,130,246,0.2); }
        .btn-action.del:hover { background: rgba(248,113,113,0.1); color: #f87171; border-color: rgba(248,113,113,0.2); }

        /* 播放模态框（保持暗色，视频播放体验更好） */
        .modal-player .modal-content {
            background: #0a0c14;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            overflow: hidden;
        }
        .modal-player .modal-header {
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 14px 20px;
        }
        .modal-player .modal-title {
            font-size: 15px;
            font-weight: 600;
            color: #e1e4ea;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 360px;
        }
        .modal-player .btn-close { filter: invert(0.6); }
        .modal-player .modal-body { padding: 0; }
        .modal-player .plyr video { aspect-ratio: 16 / 9; display: block; }
        :root {
            --plyr-color-main: #3b82f6;
            --plyr-video-background: #0a0c14;
            --plyr-video-control-background-hover: rgba(255,255,255,0.08);
            --plyr-video-control-color: #e1e4ea;
            --plyr-video-control-color-hover: #fff;
            --plyr-range-thumb-background: #3b82f6;
            --plyr-range-track-background: rgba(255,255,255,0.15);
            --plyr-menu-background: rgba(20,22,40,0.96);
            --plyr-menu-color: #c8cdd8;
            --plyr-menu-border-color: rgba(255,255,255,0.08);
            --plyr-menu-arrow-color: #7a7f96;
            --plyr-tooltip-background: rgba(20,22,40,0.96);
            --plyr-tooltip-color: #c8cdd8;
            --plyr-control-icon-size: 18px;
            --plyr-control-spacing: 10px;
        }
    </style>
</head>
<body>
<div class="app-container">

    <!-- 顶栏 -->
    <div class="header-section">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <div>
                <div class="header-title"><i class="bi bi-camera-reels"></i>视频收藏</div>
                <div class="header-sub">收藏你喜欢的视频，一键检测可用性</div>
            </div>
        </div>
        <form id="collectForm" autocomplete="off">
            <div class="row g-2">
                <div class="col-12 col-sm-9 col-md-10">
                    <input type="url" id="urlInput" class="form-control input-glass"
                           placeholder="粘贴网页URL 或视频直链（.mp4 / .m3u8），回车提交">
                </div>
                <div class="col-12 col-sm-3 col-md-2 d-grid">
                    <button type="submit" id="collectBtn" class="btn btn-collect">
                        <span id="btnText"><i class="bi bi-plus-lg"></i> 收集</span>
                        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none"></span>
                    </button>
                </div>
            </div>
        </form>
    </div>

    <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="filter-pills">
                <a class="filter-pill" th:classappend="${param.status == null ? 'active' : ''}"
                   th:href="@{/(keyword=${param.keyword})}"><span class="dot" style="background:#64748b"></span>全部</a>
                <a class="filter-pill" th:classappend="${param.status == '1' ? 'active' : ''}"
                   th:href="@{/(status=1, keyword=${param.keyword})}"><span class="dot" style="background:#16a34a"></span>可播放</a>
                <a class="filter-pill" th:classappend="${param.status == '2' ? 'active' : ''}"
                   th:href="@{/(status=2, keyword=${param.keyword})}"><span class="dot" style="background:#dc2626"></span>不可播放</a>
                <a class="filter-pill" th:classappend="${param.status == '0' ? 'active' : ''}"
                   th:href="@{/(status=0, keyword=${param.keyword})}"><span class="dot" style="background:#94a3b8"></span>未检测</a>
                <a class="filter-pill" th:classappend="${param.status == '3' ? 'active' : ''}"
                   th:href="@{/(status=3, keyword=${param.keyword})}"><span class="dot" style="background:#ca8a04"></span>解析失败</a>
            </div>
            <div class="search-group">
                <button id="batchDeleteBtn" class="btn-action del" onclick="batchDelete()" style="display:none;">
                    <i class="bi bi-trash3"></i>批量删除
                </button>
                <button id="batchMoveBtn" class="btn-action view" onclick="openBatchMoveGroup()" style="display:none;">
                    <i class="bi bi-folder"></i>移动到合集
                </button>
                <button id="checkAllBtn" class="btn-recheck" onclick="recheckAll()">
                    <i class="bi bi-arrow-repeat"></i>批量检测
                </button>
                <button class="btn-recheck" onclick="openSourceMgr()">
                    <i class="bi bi-gear"></i>视频源
                </button>
                <button class="btn-recheck" onclick="openGlobalSearch()">
                    <i class="bi bi-search"></i>总搜索
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索标题或URL..."
                       th:value="${param.keyword}" onkeyup="if(event.key==='Enter') search()">
                <button class="btn-search" onclick="search()"><i class="bi bi-search"></i></button>
            </div>
        </div>
        <!-- 合集筛选 + 合集管理 -->
        <div class="group-bar">
            <div class="group-selector">
                <label style="font-size:13px;color:#64748b;margin-right:8px;white-space:nowrap;">📁 合集:</label>
                <select id="groupFilter" class="search-input" style="width:auto;min-width:120px;padding:6px 10px;" onchange="filterByGroup()">
                    <option value="">全部合集</option>
                    <option value="__none">无合集</option>
                </select>
            </div>
            <div class="group-actions">
                <button class="btn-action" onclick="openGroupCreate()"><i class="bi bi-folder-plus"></i>新建合集</button>
                <button class="btn-action" onclick="openGroupList()"><i class="bi bi-folder"></i>管理合集</button>
                <button class="btn-action" onclick="openBatchImport()"><i class="bi bi-upload"></i>批量导入</button>
            </div>
        </div>

    <!-- 表格 -->
    <div class="table-card">
        <table class="table">
            <thead>
                <tr>
                    <th style="width:36px"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)" style="cursor:pointer;"></th>
                    <th style="width:40px">#</th>
                    <th style="width:200px">标题</th>
                    <th>合集</th>
                    <th style="width:48px">集数</th>
                    <th>状态</th>
                    <th>延迟</th>
                    <th>缓存</th>
                    <th>大小</th>
                    <th>下集</th>
                    <th>操作</th>
                    <th>收录时间</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr id="loadingRow">
                    <td colspan="12" class="text-center py-5" style="color:#94a3b8">
                        <div class="skeleton" style="height:20px;width:60%;margin:0 auto"></div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 分页 -->
    <div class="pagination-custom">
        <div class="page-info" id="pageInfo"></div>
        <ul class="page-list" id="pagination"></ul>
    </div>

    <!-- 进度弹窗 -->
    <div class="modal fade modal-custom" id="progressModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title"><i class="bi bi-arrow-repeat me-2"></i>批量检测</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="progress mb-3" style="height:8px;background:#e2e8f0;border-radius:99px;">
                        <div id="progressBar" class="progress-bar" style="width:0%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:99px;"></div>
                    </div>
                    <p class="mb-1" id="progressText" style="font-size:14px;color:#475569;">准备中...</p>
                    <p class="mb-0" id="progressDetail" style="font-size:12px;color:#94a3b8;"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" data-bs-dismiss="modal">后台运行</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 合集管理弹窗（新建/编辑） -->
    <div class="modal fade modal-custom" id="groupEditModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title" id="groupEditTitle"><i class="bi bi-folder me-2"></i>新建合集</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="groupEditId">
                    <div class="mb-3">
                        <label style="font-size:13px;color:#64748b;margin-bottom:4px;">合集名称 *</label>
                        <input type="text" id="groupEditName" class="form-control input-glass" placeholder="如：狂飙">
                    </div>
                    <div class="mb-3">
                        <label style="font-size:13px;color:#64748b;margin-bottom:4px;">描述（可选）</label>
                        <input type="text" id="groupEditDesc" class="form-control input-glass" placeholder="简短描述">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-sm" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;" onclick="saveGroup()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 合集列表管理弹窗 -->
    <div class="modal fade modal-custom" id="groupListModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title"><i class="bi bi-folder me-2"></i>管理合集</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="max-height:60vh;overflow-y:auto;">
                    <div id="groupListContent"><p style="color:#94a3b8;text-align:center;">加载中...</p></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;" onclick="openGroupCreate()">+ 新建合集</button>
                    <button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 总搜索弹窗 -->
    <div class="modal fade modal-custom" id="globalSearchModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title"><i class="bi bi-search me-2"></i>总搜索</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex gap-2 mb-2">
                        <input type="text" id="globalSearchInput" class="form-control input-glass" placeholder="输入关键词搜索视频源..." onkeyup="if(event.key==='Enter') doGlobalSearch()">
                        <button class="btn btn-collect" style="padding:10px 20px;white-space:nowrap;" onclick="doGlobalSearch()"><i class="bi bi-search"></i> 搜索</button>
                    </div>
                    <div id="globalSearchSources" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;padding:8px 10px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;max-height:80px;overflow-y:auto;">
                        <span style="color:#94a3b8;font-size:12px;padding:2px 0;"><span class="spinner-border spinner-border-sm me-1" style="width:12px;height:12px;"></span>加载视频源...</span>
                    </div>
                    <div id="globalSearchResults" style="max-height:45vh;overflow-y:auto;">
                        <p style="color:#94a3b8;text-align:center;padding:20px;">输入关键词开始搜索</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <div id="globalSearchSelected" style="font-size:13px;color:#64748b;flex:1;"></div>
                    <button type="button" class="btn btn-sm" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;display:none;" id="globalImportBtn" onclick="globalImportSelected()">导入选中</button>
                    <button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 批量导入向导弹窗 -->
    <div class="modal fade modal-custom" id="batchImportModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title" id="importStepTitle"><i class="bi bi-upload me-2"></i>批量导入</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="importStepBody">
                    <!-- 由 JS 动态渲染 -->
                </div>
                <div class="modal-footer" id="importStepFooter">
                    <button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" data-bs-dismiss="modal">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 播放模态框 -->
    <div class="modal fade modal-player" id="playModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title" id="playModalTitle"><i class="bi bi-play-circle me-2"></i><span id="playModalLabel">播放</span></h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" onclick="destroyPlayer()"></button>
                </div>
                <div class="modal-body" style="background:#000;">
                    <div id="playModalPlayerWrap">
                        <video id="playModalVideo" playsinline style="width:100%;display:block;"></video>
                    </div>
                    <div id="playModalFallback" style="display:none;padding:60px 20px;text-align:center;color:#94a3b8;">
                        <i class="bi bi-exclamation-triangle" style="font-size:40px;display:block;margin-bottom:12px;"></i>
                        <p>播放器加载失败</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="/lib/bootstrap-5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/lib/plyr-3.7.8/plyr.js"></script>
<script>
    let currentPage = 1;
    const pageSize = 20;
    let currentStatus = null;
    let currentKeyword = '';
    var videoMap = {};
    var cachePollTimers = {};
    var cacheProgress = {};
    var isMobile = /Mobi|Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
    var groupMap = {};  // id → {name, videoCount}
    var currentGroupFilter = '';

    document.addEventListener('DOMContentLoaded', function () {
        const params = new URLSearchParams(window.location.search);
        currentStatus = params.get('status') ? parseInt(params.get('status')) : null;
        currentKeyword = params.get('keyword') || '';
        currentGroupFilter = params.get('groupId') || '';
        if (currentKeyword) document.getElementById('searchInput').value = currentKeyword;
        loadGroups();
        loadData(1);
        document.getElementById('collectForm').addEventListener('submit', function (e) {
            e.preventDefault();
            collect();
        });
        document.getElementById('urlInput').addEventListener('paste', function () {
            setTimeout(() => { this.value = this.value.trim(); }, 50);
        });

        // 支持从外部跳转自动打开导入向导（如 sources.html 测试搜索结果点击导入）
        var importSourceId = params.get('importSourceId');
        var importUrl = params.get('importUrl');
        var importTitle = params.get('importTitle');
        if (importSourceId && importUrl) {
            setTimeout(function() {
                openBatchImportWithUrl(importSourceId, importUrl, importTitle || '', null);
            }, 500);
        }
    });

    function loadGroups() {
        fetch('/api/group/list')
            .then(r => r.json())
            .then(res => {
                if (res.code === 200 && res.data) {
                    var sel = document.getElementById('groupFilter');
                    // 清除之前动态添加的 option（保留前2个静态：全部合集、无合集）
                    while (sel.options.length > 2) {
                        sel.remove(sel.options.length - 1);
                    }
                    groupMap = {};
                    res.data.forEach(function(g) {
                        groupMap[g.id] = { name: g.name, videoCount: g.videoCount || 0 };
                        var opt = document.createElement('option');
                        opt.value = g.id;
                        opt.textContent = g.name + ' (' + (g.videoCount||0) + ')';
                        sel.appendChild(opt);
                    });
                    if (currentGroupFilter) sel.value = currentGroupFilter;
                }
            });
    }

    function loadData(page) {
        currentPage = page;
        const params = new URLSearchParams({ page, pageSize });
        if (currentStatus !== null) params.set('status', currentStatus);
        if (currentKeyword) params.set('keyword', currentKeyword);
        var gid = document.getElementById('groupFilter').value;
        if (gid && gid !== '__none') params.set('groupId', gid);

        fetch('/api/list?' + params.toString())
            .then(r => r.json())
            .then(res => {
                if (res.code === 200 && res.data) {
                    renderTable(res.data.list);
                    renderPagination(res.data);
                } else {
                    tbody.innerHTML = '<tr><td colspan="9" class="py-5 text-center" style="color:#dc2626">加载失败</td></tr>';
                }
            })
            .catch(() => {
                tbody.innerHTML = '<tr><td colspan="9" class="py-5 text-center" style="color:#dc2626">网络错误</td></tr>';
            });
    }

    function renderTable(list) {
        const tbody = document.getElementById('tableBody');
        if (!list || list.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9">
                <div class="empty-state">
                    <i class="bi bi-camera-video-off"></i>
                    <p>还没有收藏视频，快去收集吧</p>
                </div>
            </td></tr>`;
            return;
        }
        // 初始化视频映射（用于播放 + 缓存轮询）
        if (typeof videoMap === 'undefined') { window.videoMap = {}; }
        if (typeof cachePollTimers === 'undefined') { window.cachePollTimers = {}; }
        tbody.innerHTML = list.map(item => {
            window.videoMap[item.id] = { title: item.title, videoUrl: item.videoUrl };
            const sc = item.status === 0 ? 'status-0' : item.status === 1 ? 'status-1' : item.status === 2 ? 'status-2' : 'status-3';
            const st = item.status === 0 ? '未检测' : item.status === 1 ? '可播放' : item.status === 2 ? '不可播放' : '解析失败';
            const lt = item.latencyMs != null ? item.latencyMs + 'ms' : '-';
            const ct = item.createdAt ? item.createdAt.substring(0, 16).replace('T', ' ') : '-';
            const ttl = item.title && item.title.length > 28 ? item.title.substring(0, 28) + '...' : (item.title || '未命名');
            // 合集信息
            var gName = '';
            if (item.groupId && groupMap[item.groupId]) {
                gName = groupMap[item.groupId].name;
            } else if (item.groupId) {
                gName = '合集#' + item.groupId;
            } else {
                gName = '-';
            }
            var epNum = item.episodeNumber != null ? item.episodeNumber : '-';
            // 缓存列内容
            const isM3u8 = item.videoUrl && item.videoUrl.indexOf('.m3u8') > 0;
            var cacheHtml;
            if (!isM3u8) {
                cacheHtml = '<span style="color:#94a3b8;font-size:12px;">—</span>';
            } else if (item.isCached) {
                cacheHtml = '<span style="color:#16a34a;font-size:12px;"><i class="bi bi-check-circle-fill me-1"></i>已缓存</span>';
            } else if (cachePollTimers[item.id] && cacheProgress[item.id]) {
                cacheHtml = '<div class="cache-bar-mini" id="cache-display-' + item.id + '">' +
                    '<span class="label" style="color:#ca8a04;"><i class="bi bi-hourglass-split"></i> 缓存中…</span></div>';
            } else {
                cacheHtml = '<div class="cache-bar-mini" id="cache-display-' + item.id + '">' +
                    '<button class="btn-action view cache-btn" onclick="startCache(' + item.id + ')" id="cache-btn-' + item.id + '"><i class="bi bi-download"></i>缓存</button>' +
                    '</div>';
            }
            // 下一集状态
            var nextHtml = '<span style="color:#94a3b8;font-size:11px;">-</span>';
            if (item.groupId && item.episodeNumber != null) {
                nextHtml = '<button class="btn-action" style="font-size:11px;padding:3px 6px;" onclick="checkNextEpisode(' + item.id + ')" id="next-btn-' + item.id + '"><i class="bi bi-arrow-right-circle"></i></button>';
            }
            // 播放按钮
            var playHtml = '';
            if (item.status === 1) {
                playHtml = '<button class="btn-action play" onclick="playVideo(' + item.id + ')"><i class="bi bi-play-fill"></i><span class="label-text">播放</span></button>';
            }
            return `<tr>
                <td><input type="checkbox" class="row-checkbox" value="${item.id}" onchange="updateBatchDeleteBtn()" style="cursor:pointer;"></td>
                <td style="color:#94a3b8;font-size:13px;">${item.id}</td>
                <td title="${escapeHtml(item.title || '')}">${escapeHtml(ttl)}</td>
                <td style="font-size:12px;color:#64748b;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(gName)}">${escapeHtml(gName)}</td>
                <td style="font-size:13px;color:#475569;text-align:center;">${epNum}</td>
                <td><span class="status-pill ${sc}"><span class="sd"></span>${st}</span></td>
                <td class="latency-text">${lt}</td>
                <td class="cache-cell" id="cache-cell-${item.id}">${cacheHtml}</td>
                <td style="font-size:11px;color:#64748b;text-align:right;">${item.cacheSize || '-'}</td>
                <td class="next-cell" id="next-cell-${item.id}" style="text-align:center;">${nextHtml}</td>
                <td>
                    <div class="action-group">
                    ${playHtml}
                    <a href="/detail/${item.id}" class="btn-action view"><i class="bi bi-eye"></i><span class="label-text">查看</span></a>
                    <button class="btn-action check" onclick="recheckOne(${item.id})"><i class="bi bi-arrow-repeat"></i><span class="label-text">检测</span></button>

    function renderPagination(data) {

        const ul = document.getElementById('pagination');

        html += `<li class="page-item-custom ${prevDisabled ? 'disabled' : ''}"><a onclick="${prevDisabled ? '' : 'loadData('+(page-1)+')'}"><i class="bi bi-chevron-left"></i></a></li>`;
        let start = Math.max(1, page - 2), end = Math.min(totalPages, page + 2);
        if (start > 1) { html += `<li class="page-item-custom"><a onclick="loadData(1)">1</a></li>`; if (start > 2) html += `<li class="page-item-custom disabled"><a>...</a></li>`; }
        for (let i = start; i <= end; i++) html += `<li class="page-item-custom ${i===page?'active':''}"><a onclick="loadData(${i})">${i}</a></li>`;
        if (end < totalPages) { if (end < totalPages - 1) html += `<li class="page-item-custom disabled"><a>...</a></li>`; html += `<li class="page-item-custom"><a onclick="loadData(${totalPages})">${totalPages}</a></li>`; }
        const nextDisabled = page >= totalPages;
        html += `<li class="page-item-custom ${nextDisabled?'disabled':''}"><a onclick="${nextDisabled?'':'loadData('+(page+1)+')'}"><i class="bi bi-chevron-right"></i></a></li>`;

    var currentPlayer = null;

    function playVideo(id) {
        var info = videoMap[id];
        if (!info) { showToast('视频信息丢失', 'warning'); return; }
        var videoUrl = info.videoUrl;
        var title = info.title || '未命名';
        document.getElementById('playModalLabel').textContent = title;

        var modal = new bootstrap.Modal(document.getElementById('playModal'));
        modal.show();

        var video = document.getElementById('playModalVideo');
        // 等待模态框渲染完毕
        setTimeout(function() {
            destroyPlayer();
            if (videoUrl.indexOf('.m3u8') > 0) {
                var proxyUrl = '/proxy/m3u8?url=' + encodeURIComponent(videoUrl) + '&title=' + encodeURIComponent(title);
                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    var hls = new Hls();
                    hls.loadSource(proxyUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        setTimeout(function() { initPlyr(video); }, 100);
                    });
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            console.error('HLS 播放失败:', data.type, data.details);
                            hls.destroy();
                            video.src = proxyUrl;
                            initPlyr(video);
                        }
                    });
                    // 超时回退
                    setTimeout(function() {
                        if (!window._hlsReady) { hls.destroy(); video.src = proxyUrl; initPlyr(video); }
                    }, 10000);
                } else {
                    video.src = proxyUrl;
                    initPlyr(video);
                }
            } else {
                video.src = videoUrl;
                initPlyr(video);
            }
        }, 200);
    }

    function initPlyr(video) {
        if (typeof Plyr === 'undefined') {
            video.controls = true;
            return;
        }
        try {
            currentPlayer = new Plyr(video, {
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 3, 4] },
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                keyboard: { focused: true, global: true },
                tooltips: { controls: true, seek: true },
                resetOnEnd: true
            });
        } catch(e) {
            console.warn('Plyr 初始化失败:', e);
            video.controls = true;
        }
    }

    function destroyPlayer() {
        if (currentPlayer) {
            try { currentPlayer.destroy(); } catch(e) {}
            currentPlayer = null;
        }
        var video = document.getElementById('playModalVideo');
        video.removeAttribute('src');
        video.load();
    }

    // ===== 缓存功能 =====

    function startCache(id) {
        var info = videoMap[id];
        if (!info) return;
        var btn = document.getElementById('cache-btn-' + id);
        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; }

        // 初始化进度跟踪
        cacheProgress[id] = { lastTotal: 0, lastCached: 0, stalledSince: null, retryCount: 0, isRetrying: false };

        // 调用 POST /api/cache/start
        var url = '/api/cache/start?videoUrl=' + encodeURIComponent(info.videoUrl)
                + '&title=' + encodeURIComponent(info.title || '')
                + '&id=' + id;
        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, 5000);
        fetch(url, { method: 'POST', signal: controller.signal })
            .then(function(r) { clearTimeout(timeoutId); return r.json(); })
            .then(function(data) {
                if (data.started) {
                    showToast('缓存已启动', 'success');
                    if (isMobile) {
                        // 手机：toast 提示 + 短暂显示"已提交"后恢复按钮
                        if (btn) { btn.innerHTML = '<i class="bi bi-check"></i> 已提交'; }
                        setTimeout(function() {
                            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-download"></i>缓存'; }
                        }, 2000);
                        delete cacheProgress[id];
                    } else {
                        // PC：显示缓存中 + 启动轮询
                        if (btn) { btn.innerHTML = '<i class="bi bi-cloud-download"></i> 缓存中…'; }
                        if (!cachePollTimers[id]) {
                            cachePollTimers[id] = setInterval(function() { pollCacheStatus(id); }, 5000);
                        }
                        pollCacheStatus(id);
                    }
                } else {
                    showToast(data.error || '缓存启动失败', 'danger');
                    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-download"></i>缓存'; }
                    delete cacheProgress[id];
                }
            })
            .catch(function() {
                clearTimeout(timeoutId);
                showToast('缓存请求超时或失败', 'warning');
                // 即使超时也启动轮询，后台任务可能仍在执行
                if (!isMobile && !cachePollTimers[id]) {
                    cachePollTimers[id] = setInterval(function() { pollCacheStatus(id); }, 5000);
                }
                if (!isMobile) { pollCacheStatus(id); }
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-download"></i>缓存'; }
            });
    }

    function stopCachePoll(id) {
        if (cachePollTimers[id]) {
            clearInterval(cachePollTimers[id]);
            delete cachePollTimers[id];
        }
        if (cacheProgress[id]) {
            delete cacheProgress[id];
        }
    }

    function pollCacheStatus(id) {
        var info = videoMap[id];
        if (!info) { stopCachePoll(id); return; }

        // 正在重试中，跳过本次轮询避免干扰
        if (cacheProgress[id] && cacheProgress[id].isRetrying) return;

        var url = '/api/cache/status?videoUrl=' + encodeURIComponent(info.videoUrl)
                + '&title=' + encodeURIComponent(info.title || '')
                + '&id=' + id;
        fetch(url)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var display = document.getElementById('cache-display-' + id);
                if (!display) { stopCachePoll(id); return; }

                // 确保 cacheProgress 存在
                if (!cacheProgress[id]) {
                    cacheProgress[id] = { lastTotal: 0, lastCached: 0, stalledSince: null, retryCount: 0, isRetrying: false };
                }
                var prog = cacheProgress[id];

                // 情况 1：缓存完成
                if (data.finished || (data.total > 0 && data.cached === data.total)) {
                    display.innerHTML = '<span style="color:#16a34a;font-size:12px;"><i class="bi bi-check-circle-fill me-1"></i>已缓存</span>';
                    stopCachePoll(id);
                    return;
                }

                // 情况 2：total === 0（m3u8 未解析或正在拉取）
                if (!data || data.total === 0) {
                    display.innerHTML = '<div class="cache-bar-mini"><span class="label" style="color:#ca8a04;"><i class="bi bi-hourglass-split"></i> 等待中…</span></div>';
                    checkStall(id, data);
                    return;
                }

                // 情况 3：total > 0，显示进度条
                var pct = Math.round(data.cached / data.total * 100);
                var mb = (data.cachedBytes / 1048576).toFixed(1);
                display.innerHTML = '<div class="cache-bar-mini"><div class="track"><div class="fill" style="width:' + pct + '%;"></div></div><span class="label"><span class="num">' + data.cached + '/' + data.total + '</span> <span style="color:#94a3b8;font-size:11px;">' + mb + 'MB</span></span></div>';

                // 进度有增长 → 重置停滞计时
                if (data.cached > prog.lastCached) {
                    prog.lastCached = data.cached;
                    prog.lastTotal = data.total;
                    prog.stalledSince = null;
                } else if (prog.stalledSince === null) {
                    // 第一次检测到无进度
                    prog.stalledSince = Date.now();
                    prog.lastTotal = data.total;
                } else {
                    // 检查是否停滞超时
                    checkStall(id, data);
                }
            })
            .catch(function() {});
    }

    /** 检查缓存进度是否停滞超过 20 秒，若是则自动重试 */
    function checkStall(id, data) {
        var prog = cacheProgress[id];
        if (!prog || prog.isRetrying) return;
        if (prog.stalledSince === null) {
            prog.stalledSince = Date.now();
            return;
        }
        var elapsed = Date.now() - prog.stalledSince;
        if (elapsed >= 20000) {
            cacheRetry(id);
        } else if (elapsed >= 15000) {
            // 最后 5 秒显示倒计时
            var remaining = Math.ceil((20000 - elapsed) / 1000);
            var display = document.getElementById('cache-display-' + id);
            if (display) {
                display.innerHTML = '<div class="cache-bar-mini"><span class="label" style="color:#ca8a04;"><i class="bi bi-arrow-repeat"></i> ' + remaining + 's后重试…</span></div>';
            }
        }
    }

    /** 自动重试缓存：清 m3u8 缓存 → 重新拉取 → 更新状态 */
    function cacheRetry(id) {
        var info = videoMap[id];
        if (!info) return;
        var prog = cacheProgress[id];
        if (!prog) return;

        prog.retryCount++;
        if (prog.retryCount >= 3) {
            var display = document.getElementById('cache-display-' + id);
            if (display) {
                display.innerHTML = '<span style="color:#dc2626;font-size:12px;"><i class="bi bi-exclamation-circle"></i> 缓存失败，请<a href="javascript:location.reload()" style="color:#3b82f6;">刷新</a></span>';
            }
            stopCachePoll(id);
            return;
        }

        prog.isRetrying = true;
        prog.stalledSince = null;

        var display = document.getElementById('cache-display-' + id);
        if (display) {
            display.innerHTML = '<div class="cache-bar-mini"><span class="label" style="color:#ca8a04;"><i class="bi bi-arrow-repeat"></i> 重试中…(' + prog.retryCount + '/3)</span></div>';
        }

        var url = '/api/cache/retry?videoUrl=' + encodeURIComponent(info.videoUrl)
                + '&title=' + encodeURIComponent(info.title || '')
                + '&id=' + id;
        fetch(url, { method: 'POST' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                prog.isRetrying = false;
                // 用新状态立即更新 UI
                var d = document.getElementById('cache-display-' + id);
                if (d && data) {
                    if (data.total > 0) {
                        var pct = Math.round(data.cached / data.total * 100);
                        d.innerHTML = '<div class="cache-bar-mini"><div class="track"><div class="fill" style="width:' + pct + '%;"></div></div><span class="label"><span class="num">' + data.cached + '/' + data.total + '</span></span></div>';
                        prog.lastCached = data.cached;
                        prog.lastTotal = data.total;
                    } else {
                        d.innerHTML = '<div class="cache-bar-mini"><span class="label" style="color:#ca8a04;"><i class="bi bi-hourglass-split"></i> 等待中…</span></div>';
                    }
                }
            })
            .catch(function() {
                prog.isRetrying = false;
            });
    }
