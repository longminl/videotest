<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频收藏工具</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/hls.js/1.5.17/hls.min.js"></script>
    <link href="https://cdn.plyr.io/3.7.8/plyr.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body {
            background: #0f1117;
            color: #e1e4ea;
            min-height: 100vh;
        }
        .app-container { max-width: 1320px; margin: 0 auto; padding: 24px 20px; }

        /* 顶栏渐变 */
        .header-section {
            background: linear-gradient(135deg, #1a1d2e 0%, #16182a 50%, #1e2035 100%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .header-title {
            font-size: 22px;
            font-weight: 700;
            color: #f0f3f9;
            letter-spacing: -0.3px;
        }
        .header-title i { color: #6c8cff; margin-right: 10px; }
        .header-sub {
            font-size: 13px;
            color: #7a7f96;
            margin-top: 2px;
        }

        /* 输入框区域 */
        .input-glass {
            background: rgba(255,255,255,0.04) !important;
            border: 1px solid rgba(255,255,255,0.08) !important;
            color: #e1e4ea !important;
            border-radius: 12px !important;
            padding: 14px 18px !important;
            font-size: 15px !important;
            transition: all 0.25s;
        }
        .input-glass:focus {
            background: rgba(255,255,255,0.07) !important;
            border-color: #6c8cff !important;
            box-shadow: 0 0 0 3px rgba(108,140,255,0.12) !important;
        }
        .input-glass::placeholder { color: #5a5f78; }
        .btn-collect {
            background: linear-gradient(135deg, #6c8cff, #5b7cf0);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            padding: 14px 20px;
            transition: all 0.25s;
            color: #fff;
        }
        .btn-collect:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,140,255,0.3); }
        .btn-collect:disabled { opacity: 0.6; transform: none; }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .filter-pills {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.04);
            padding: 4px;
            border-radius: 10px;
        }
        .filter-pill {
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #7a7f96;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-pill:hover { color: #c8cdd8; background: rgba(255,255,255,0.06); }
        .filter-pill.active {
            color: #fff;
            background: rgba(108,140,255,0.2);
            box-shadow: 0 2px 8px rgba(108,140,255,0.15);
        }
        .filter-pill .dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .search-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .search-input {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 9px 14px;
            color: #e1e4ea;
            font-size: 13px;
            width: 200px;
            transition: all 0.2s;
        }
        .search-input:focus { outline: none; border-color: #6c8cff; background: rgba(255,255,255,0.07); }
        .search-input::placeholder { color: #5a5f78; }

        /* 表格卡片 */
        .table-card {
            background: #16182a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        .table-card table { margin-bottom: 0; }
        .table-card thead th {
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            color: #7a7f96;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px 16px;
        }
        .table-card tbody td {
            border-color: rgba(255,255,255,0.04);
            color: #c8cdd8;
            padding: 14px 16px;
            vertical-align: middle;
            font-size: 14px;
        }
        .table-card tbody tr { transition: background 0.15s; }
        .table-card tbody tr:hover { background: rgba(108,140,255,0.04); }

        .url-text {
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            vertical-align: middle;
            color: #7a7f96;
            font-size: 13px;
        }
        .latency-text { font-family: 'JetBrains Mono', monospace; color: #6c8cff; font-weight: 500; }
        .time-text { font-size: 13px; color: #6a6f85; }

        /* 状态徽章 */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pill .sd { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .status-0 { background: rgba(160,167,191,0.12); color: #a0a7bf; }
        .status-0 .sd { background: #a0a7bf; }
        .status-1 { background: rgba(52,211,153,0.12); color: #34d399; }
        .status-1 .sd { background: #34d399; }
        .status-2 { background: rgba(248,113,113,0.12); color: #f87171; }
        .status-2 .sd { background: #f87171; }
        .status-3 { background: rgba(251,191,36,0.12); color: #fbbf24; }
        .status-3 .sd { background: #fbbf24; }

        /* 操作按钮 */
        .action-group { display: flex; gap: 4px; }
        .btn-action {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
            color: #7a7f96;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .btn-action:hover { background: rgba(255,255,255,0.06); color: #e1e4ea; border-color: rgba(255,255,255,0.1); }
        .btn-action.view:hover { background: rgba(108,140,255,0.12); color: #6c8cff; border-color: rgba(108,140,255,0.2); }
        .btn-action.check:hover { background: rgba(251,191,36,0.12); color: #fbbf24; border-color: rgba(251,191,36,0.2); }
        .btn-action.del:hover { background: rgba(248,113,113,0.12); color: #f87171; border-color: rgba(248,113,113,0.2); }
        .btn-action i { font-size: 13px; }

        /* 分页 */
        .pagination-custom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 0 4px;
        }
        .page-info { font-size: 13px; color: #6a6f85; }
        .page-list { display: flex; gap: 2px; list-style: none; margin: 0; padding: 0; }
        .page-item-custom a {
            display: flex; align-items: center; justify-content: center;
            min-width: 34px; height: 34px;
            border-radius: 8px;
            font-size: 13px;
            color: #7a7f96;
            text-decoration: none;
            transition: all 0.15s;
            cursor: pointer;
        }
        .page-item-custom a:hover { background: rgba(255,255,255,0.06); color: #e1e4ea; }
        .page-item-custom.active a { background: rgba(108,140,255,0.2); color: #6c8cff; font-weight: 600; }
        .page-item-custom.disabled a { opacity: 0.3; cursor: default; pointer-events: none; }

        /* Toast */
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; }
        .toast-custom {
            border-radius: 12px;
            padding: 12px 18px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            font-size: 14px;
        }
        .toast-custom .toast-body { display: flex; align-items: center; gap: 8px; }

        /* 空状态 */
        .empty-state { padding: 60px 20px; text-align: center; }
        .empty-state i { font-size: 48px; color: #2a2d40; margin-bottom: 16px; }
        .empty-state p { color: #5a5f78; font-size: 15px; }

        /* 加载骨架 */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* 进度弹窗 */
        .modal-custom .modal-content {
            background: #1a1d2e;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            color: #e1e4ea;
        }
        .modal-custom .modal-header { border-bottom: 1px solid rgba(255,255,255,0.06); }
        .modal-custom .modal-footer { border-top: 1px solid rgba(255,255,255,0.06); }
        .modal-custom .btn-close { filter: invert(0.6); }

        /* 批量检测 */
        .btn-recheck {
            background: rgba(108,140,255,0.08);
            border: 1px solid rgba(108,140,255,0.15);
            border-radius: 10px;
            padding: 9px 18px;
            font-size: 13px;
            font-weight: 500;
            color: #6c8cff;
            transition: all 0.2s;
        }
        .btn-recheck:hover {
            background: rgba(108,140,255,0.15);
            color: #8ba4ff;
            border-color: rgba(108,140,255,0.25);
        }
        .btn-recheck i { margin-right: 4px; }

        .btn-search {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 9px 14px;
            color: #7a7f96;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-search:hover { background: rgba(255,255,255,0.08); color: #e1e4ea; }

        /* ===== 响应式断点 ===== */

        /* 平板及以下 */
        @media (max-width: 768px) {
            .app-container { padding: 16px 12px; }
            .header-section { padding: 18px; border-radius: 12px; }
            .header-title { font-size: 19px; }
            .filter-bar { flex-direction: column; align-items: stretch; gap: 10px; }
            .filter-pills { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
            .filter-pill { font-size: 12px; padding: 6px 12px; white-space: nowrap; }
            .search-group { width: 100%; }
            .search-input { flex: 1; min-width: 0; width: auto; }
            .table-card { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .table-card table { min-width: 640px; }
            .table-card thead th,
            .table-card tbody td { padding: 10px 10px; font-size: 13px; }
            .url-text { max-width: 140px; }
            .action-group { flex-wrap: wrap; gap: 3px; }
            .btn-action { padding: 5px 8px; font-size: 11px; }
            /* 分页紧凑 */
            .pagination-custom { flex-direction: column; gap: 8px; align-items: center; }
            .page-info { font-size: 12px; }
        }

        /* 手机 */
        @media (max-width: 576px) {
            .app-container { padding: 12px 8px; }
            .header-section { padding: 14px; }
            .header-title { font-size: 17px; }
            .header-title i { margin-right: 6px; }
            .header-sub { font-size: 12px; }
            .input-glass { padding: 11px 14px !important; font-size: 14px !important; }
            .btn-collect { padding: 11px 14px; font-size: 14px; }
            .table-card { border-radius: 10px; }
            .table-card thead th { font-size: 11px; padding: 8px 6px; }
            .table-card tbody td { padding: 8px 6px; font-size: 12px; }
            .table-card thead th:nth-child(3),
            .table-card tbody td:nth-child(3) { display: none; }  /* 隐藏来源列 */
            .latency-text { font-size: 12px; }
            .cache-cell { font-size: 11px; }
            .cache-bar-mini .track { width: 36px; }
            .cache-bar-mini .label { font-size: 10px; }
            .status-pill { font-size: 11px; padding: 3px 8px; }
            .status-pill .sd { width: 5px; height: 5px; }
            .time-text { font-size: 11px; }
            .action-group { gap: 2px; }
            .btn-action { padding: 4px 6px; font-size: 10px; border-radius: 6px; }
            .btn-action i { font-size: 11px; }
            /* 分页 */
            .page-item-custom a { min-width: 28px; height: 28px; font-size: 12px; }
            .page-info { font-size: 11px; }
            /* 批量检测按钮 */
            .btn-recheck { font-size: 12px; padding: 7px 12px; }
            /* 进度弹窗 */
            .modal-custom .modal-content { border-radius: 12px; }
        }

        /* 小屏手机 */
        @media (max-width: 400px) {
            .header-section { padding: 10px; }
            .header-title { font-size: 15px; }
            .filter-pill { font-size: 11px; padding: 5px 8px; }
            .table-card thead th,
            .table-card tbody td { padding: 6px 4px; font-size: 11px; }
            .table-card thead th:nth-child(6),
            .table-card tbody td:nth-child(6) { display: none; }  /* 隐藏收录时间列 */
            .status-pill { font-size: 10px; padding: 2px 6px; }
            .btn-action { padding: 3px 5px; font-size: 9px; }
        }

        /* 播放模态框：手机全屏 */
        @media (max-width: 576px) {
            .modal-player .modal-dialog {
                margin: 0;
                max-width: 100%;
            }
            .modal-player .modal-content {
                border-radius: 0;
                border: none;
                min-height: 100vh;
            }
            .modal-player .modal-header {
                padding: 10px 14px;
            }
            .modal-player .modal-title {
                font-size: 14px;
                max-width: 260px;
            }
            .modal-player .plyr video { aspect-ratio: 16 / 9; }
        }

        /* 移动端性能优化 */
        .btn-action, .btn-collect, .filter-pill, .page-item-custom a,
        .input-glass, .btn-search, .btn-recheck {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        @media (max-width: 768px) {
            .toast-custom { backdrop-filter: none !important; }
            .skeleton { animation: none !important; background: rgba(255,255,255,0.04) !important; }
            .btn-action, .btn-collect { transition: color 0.2s, background 0.2s; }
            .header-section { box-shadow: none; }
            .cache-bar-mini .fill { transition: none; }
        }

        /* 缓存列 */
        .cache-cell { font-size: 13px; }
        .cache-bar-mini {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .cache-bar-mini .track {
            width: 50px;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            overflow: hidden;
        }
        .cache-bar-mini .fill {
            height: 100%;
            background: linear-gradient(90deg, #6c8cff, #34d399);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .cache-bar-mini .label {
            font-size: 11px;
            color: #7a7f96;
            white-space: nowrap;
        }
        .cache-bar-mini .label .num { color: #c8cdd8; font-weight: 600; }

        /* 播放按钮 */
        .btn-action.play:hover { background: rgba(52,211,153,0.12); color: #34d399; border-color: rgba(52,211,153,0.2); }

        /* 播放模态框 */
        .modal-player .modal-content {
            background: #0a0c14;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            overflow: hidden;
        }
        .modal-player .modal-header {
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 14px 20px;
        }
        .modal-player .modal-title {
            font-size: 15px;
            font-weight: 600;
            color: #e1e4ea;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 360px;
        }
        .modal-player .btn-close { filter: invert(0.6); }
        .modal-player .modal-body { padding: 0; }
        .modal-player .plyr video { aspect-ratio: 16 / 9; display: block; }
        :root {
            --plyr-color-main: #6c8cff;
            --plyr-video-background: #0a0c14;
            --plyr-video-control-background-hover: rgba(255,255,255,0.08);
            --plyr-video-control-color: #e1e4ea;
            --plyr-video-control-color-hover: #fff;
            --plyr-range-thumb-background: #6c8cff;
            --plyr-range-track-background: rgba(255,255,255,0.15);
            --plyr-menu-background: rgba(20,22,40,0.96);
            --plyr-menu-color: #c8cdd8;
            --plyr-menu-border-color: rgba(255,255,255,0.08);
            --plyr-menu-arrow-color: #7a7f96;
            --plyr-tooltip-background: rgba(20,22,40,0.96);
            --plyr-tooltip-color: #c8cdd8;
            --plyr-control-icon-size: 18px;
            --plyr-control-spacing: 10px;
        }
    </style>
</head>
<body>
<div class="app-container">

    <!-- 顶栏 -->
    <div class="header-section">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <div>
                <div class="header-title"><i class="bi bi-camera-reels"></i>视频收藏</div>
                <div class="header-sub">收藏你喜欢的视频，一键检测可用性</div>
            </div>
        </div>
        <form id="collectForm" autocomplete="off">
            <div class="row g-2">
                <div class="col-12 col-sm-9 col-md-10">
                    <input type="url" id="urlInput" class="form-control input-glass"
                           placeholder="粘贴网页URL 或视频直链（.mp4 / .m3u8），回车提交">
                </div>
                <div class="col-12 col-sm-3 col-md-2 d-grid">
                    <button type="submit" id="collectBtn" class="btn btn-collect">
                        <span id="btnText"><i class="bi bi-plus-lg"></i> 收集</span>
                        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none"></span>
                    </button>
                </div>
            </div>
        </form>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
        <div class="filter-pills">
            <a class="filter-pill" th:classappend="${param.status == null ? 'active' : ''}"
               th:href="@{/(keyword=${param.keyword})}"><span class="dot" style="background:#7a7f96"></span>全部</a>
            <a class="filter-pill" th:classappend="${param.status == '1' ? 'active' : ''}"
               th:href="@{/(status=1, keyword=${param.keyword})}"><span class="dot" style="background:#34d399"></span>可播放</a>
            <a class="filter-pill" th:classappend="${param.status == '2' ? 'active' : ''}"
               th:href="@{/(status=2, keyword=${param.keyword})}"><span class="dot" style="background:#f87171"></span>不可播放</a>
            <a class="filter-pill" th:classappend="${param.status == '0' ? 'active' : ''}"
               th:href="@{/(status=0, keyword=${param.keyword})}"><span class="dot" style="background:#a0a7bf"></span>未检测</a>
            <a class="filter-pill" th:classappend="${param.status == '3' ? 'active' : ''}"
               th:href="@{/(status=3, keyword=${param.keyword})}"><span class="dot" style="background:#fbbf24"></span>解析失败</a>
        </div>
        <div class="search-group">
            <button id="checkAllBtn" class="btn-recheck" onclick="recheckAll()">
                <i class="bi bi-arrow-repeat"></i>批量检测
            </button>
            <input type="text" id="searchInput" class="search-input" placeholder="搜索标题或URL..."
                   th:value="${param.keyword}" onkeyup="if(event.key==='Enter') search()">
            <button class="btn-search" onclick="search()"><i class="bi bi-search"></i></button>
        </div>
    </div>

    <!-- 表格 -->
    <div class="table-card">
        <table class="table">
            <thead>
                <tr>
                    <th style="width:48px">#</th>
                    <th>标题</th>
                    <th style="width:22%">来源</th>
                    <th style="width:100px">状态</th>
                    <th style="width:80px">延迟</th>
                    <th style="width:90px">缓存</th>
                    <th style="width:110px">收录时间</th>
                    <th style="width:170px">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr id="loadingRow">
                    <td colspan="8" class="text-center py-5" style="color:#5a5f78">
                        <div class="skeleton" style="height:20px;width:60%;margin:0 auto"></div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 分页 -->
    <div class="pagination-custom">
        <div class="page-info" id="pageInfo"></div>
        <ul class="page-list" id="pagination"></ul>
    </div>

    <!-- 进度弹窗 -->
    <div class="modal fade modal-custom" id="progressModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title"><i class="bi bi-arrow-repeat me-2"></i>批量检测</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="progress mb-3" style="height:8px;background:rgba(255,255,255,0.06);border-radius:99px;">
                        <div id="progressBar" class="progress-bar" style="width:0%;background:linear-gradient(90deg,#6c8cff,#8ba4ff);border-radius:99px;"></div>
                    </div>
                    <p class="mb-1" id="progressText" style="font-size:14px;color:#c8cdd8;">准备中...</p>
                    <p class="mb-0" id="progressDetail" style="font-size:12px;color:#6a6f85;"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm" style="background:rgba(255,255,255,0.06);color:#7a7f96;border:none;border-radius:8px;" data-bs-dismiss="modal">后台运行</button>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- 播放模态框 -->
    <div class="modal fade modal-player" id="playModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title" id="playModalTitle"><i class="bi bi-play-circle me-2"></i><span id="playModalLabel">播放</span></h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" onclick="destroyPlayer()"></button>
                </div>
                <div class="modal-body" style="background:#000;">
                    <div id="playModalPlayerWrap">
                        <video id="playModalVideo" controls playsinline style="width:100%;display:block;"></video>
                    </div>
                    <div id="playModalFallback" style="display:none;padding:60px 20px;text-align:center;color:#5a5f78;">
                        <i class="bi bi-exclamation-triangle" style="font-size:40px;display:block;margin-bottom:12px;"></i>
                        <p>播放器加载失败</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    let currentPage = 1;
    const pageSize = 20;
    let currentStatus = null;
    let currentKeyword = '';
    var videoMap = {};
    var cachePollTimers = {};
    var cacheProgress = {};
    var isMobile = /Mobi|Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

    document.addEventListener('DOMContentLoaded', function () {
        const params = new URLSearchParams(window.location.search);
        currentStatus = params.get('status') ? parseInt(params.get('status')) : null;
        currentKeyword = params.get('keyword') || '';
        if (currentKeyword) document.getElementById('searchInput').value = currentKeyword;
        loadData(1);
        document.getElementById('collectForm').addEventListener('submit', function (e) {
            e.preventDefault();
            collect();
        });
        document.getElementById('urlInput').addEventListener('paste', function () {
            setTimeout(() => { this.value = this.value.trim(); }, 50);
        });
    });

    function loadData(page) {
        currentPage = page;
        const params = new URLSearchParams({ page, pageSize });
        if (currentStatus !== null) params.set('status', currentStatus);
        if (currentKeyword) params.set('keyword', currentKeyword);

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="8" class="py-5 text-center" style="color:#5a5f78"><div class="skeleton" style="height:20px;width:60%;margin:0 auto"></div></td></tr>';

        fetch('/api/list?' + params.toString())
            .then(r => r.json())
            .then(res => {
                if (res.code === 200 && res.data) {
                    renderTable(res.data.list);
                    renderPagination(res.data);
                } else {
                    tbody.innerHTML = '<tr><td colspan="8" class="py-5 text-center" style="color:#f87171">加载失败</td></tr>';
                }
            })
            .catch(() => {
                tbody.innerHTML = '<tr><td colspan="8" class="py-5 text-center" style="color:#f87171">网络错误</td></tr>';
            });
    }

    function renderTable(list) {
        const tbody = document.getElementById('tableBody');
        if (!list || list.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8">
                <div class="empty-state">
                    <i class="bi bi-camera-video-off"></i>
                    <p>还没有收藏视频，快去收集吧</p>
                </div>
            </td></tr>`;
            return;
        }
        // 初始化视频映射（用于播放 + 缓存轮询）
        if (typeof videoMap === 'undefined') { window.videoMap = {}; }
        if (typeof cachePollTimers === 'undefined') { window.cachePollTimers = {}; }
        tbody.innerHTML = list.map(item => {
            window.videoMap[item.id] = { title: item.title, videoUrl: item.videoUrl };
            const sc = item.status === 0 ? 'status-0' : item.status === 1 ? 'status-1' : item.status === 2 ? 'status-2' : 'status-3';
            const st = item.status === 0 ? '未检测' : item.status === 1 ? '可播放' : item.status === 2 ? '不可播放' : '解析失败';
            const lt = item.latencyMs != null ? item.latencyMs + 'ms' : '-';
            const ct = item.createdAt ? item.createdAt.substring(0, 16) : '-';
            const ttl = item.title && item.title.length > 32 ? item.title.substring(0, 32) + '...' : (item.title || '未命名');
            const src = item.sourceUrl && item.sourceUrl.length > 32 ? item.sourceUrl.substring(0, 32) + '...' : (item.sourceUrl || '-');
            // 缓存列内容
            const isM3u8 = item.videoUrl && item.videoUrl.indexOf('.m3u8') > 0;
            var cacheHtml;
            if (!isM3u8) {
                cacheHtml = '<span style="color:#5a5f78;font-size:12px;">—</span>';
            } else if (item.isCached) {
                cacheHtml = '<span style="color:#34d399;font-size:12px;"><i class="bi bi-check-circle-fill me-1"></i>已缓存</span>';
            } else if (cachePollTimers[item.id] && cacheProgress[item.id]) {
                // 缓存进行中，显示"缓存中…"
                cacheHtml = '<div class="cache-bar-mini" id="cache-display-' + item.id + '">' +
                    '<span class="label" style="color:#fbbf24;"><i class="bi bi-hourglass-split"></i> 缓存中…</span></div>';
            } else {
                cacheHtml = '<div class="cache-bar-mini" id="cache-display-' + item.id + '">' +
                    '<button class="btn-action view cache-btn" onclick="startCache(' + item.id + ')" id="cache-btn-' + item.id + '"><i class="bi bi-download"></i>缓存</button>' +
                    '</div>';
            }
            // 播放按钮
            var playHtml = '';
            if (item.status === 1) {
                playHtml = '<button class="btn-action play" onclick="playVideo(' + item.id + ')"><i class="bi bi-play-fill"></i>播放</button>';
            }
            return `<tr>
                <td style="color:#5a5f78;font-size:13px;">${item.id}</td>
                <td title="${escapeHtml(item.title || '')}">${escapeHtml(ttl)}</td>
                <td><span class="url-text" title="${escapeHtml(item.sourceUrl || '')}">${escapeHtml(src)}</span></td>
                <td><span class="status-pill ${sc}"><span class="sd"></span>${st}</span></td>
                <td class="latency-text">${lt}</td>
                <td class="cache-cell" id="cache-cell-${item.id}">${cacheHtml}</td>
                <td class="time-text">${ct}</td>
                <td class="action-group">
                    ${playHtml}
                    <a href="/detail/${item.id}" class="btn-action view"><i class="bi bi-eye"></i>查看</a>
                    <button class="btn-action check" onclick="recheckOne(${item.id})"><i class="bi bi-arrow-repeat"></i>检测</button>
                    <button class="btn-action del" onclick="deleteOne(${item.id})"><i class="bi bi-trash3"></i></button>
                </td>
            </tr>`;
        }).join('');
        // 对已开始缓存的项继续轮询
        for (var id in cachePollTimers) {
            if (cachePollTimers.hasOwnProperty(id) && videoMap[id]) {
                pollCacheStatus(id);
            }
        }
    }

    function renderPagination(data) {
        const { page, totalPages, total } = data;
        document.getElementById('pageInfo').textContent = '共 ' + total + ' 条，第 ' + page + '/' + totalPages + ' 页';
        const ul = document.getElementById('pagination');
        let html = '';
        const prevDisabled = page <= 1;
        html += `<li class="page-item-custom ${prevDisabled ? 'disabled' : ''}"><a onclick="${prevDisabled ? '' : 'loadData('+(page-1)+')'}"><i class="bi bi-chevron-left"></i></a></li>`;
        let start = Math.max(1, page - 2), end = Math.min(totalPages, page + 2);
        if (start > 1) { html += `<li class="page-item-custom"><a onclick="loadData(1)">1</a></li>`; if (start > 2) html += `<li class="page-item-custom disabled"><a>...</a></li>`; }
        for (let i = start; i <= end; i++) html += `<li class="page-item-custom ${i===page?'active':''}"><a onclick="loadData(${i})">${i}</a></li>`;
        if (end < totalPages) { if (end < totalPages - 1) html += `<li class="page-item-custom disabled"><a>...</a></li>`; html += `<li class="page-item-custom"><a onclick="loadData(${totalPages})">${totalPages}</a></li>`; }
        const nextDisabled = page >= totalPages;
        html += `<li class="page-item-custom ${nextDisabled?'disabled':''}"><a onclick="${nextDisabled?'':'loadData('+(page+1)+')'}"><i class="bi bi-chevron-right"></i></a></li>`;
        ul.innerHTML = html;
    }

    function collect() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) { showToast('请输入URL', 'warning'); return; }
        const btn = document.getElementById('collectBtn');
        const bt = document.getElementById('btnText');
        const sp = document.getElementById('btnSpinner');
        btn.disabled = true; bt.innerHTML = '收集中...'; sp.classList.remove('d-none');
        fetch('/api/collect', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) })
            .then(r => r.json()).then(res => {
                if (res.code === 200) { showToast(res.message || '收录成功', 'success'); document.getElementById('urlInput').value = ''; loadData(1); }
                else { showToast(res.message || '收录失败', 'danger'); }
            }).catch(() => showToast('请求失败', 'danger'))
            .finally(() => { btn.disabled = false; bt.innerHTML = '<i class="bi bi-plus-lg"></i> 收集'; sp.classList.add('d-none'); });
    }

    function recheckOne(id) {
        const btn = event.target.closest('button');
        btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        fetch('/api/check/' + id, {method:'PUT'})
            .then(r => r.json()).then(res => { showToast(res.message || '检测完成', res.code===200?'success':'warning'); loadData(currentPage); })
            .catch(() => showToast('请求失败','danger'))
            .finally(() => { btn.disabled=false; btn.innerHTML='<i class="bi bi-arrow-repeat"></i>检测'; });
    }

    function recheckAll() {
        if (!confirm('重新检测所有异常记录？')) return;
        const modal = new bootstrap.Modal(document.getElementById('progressModal'));
        modal.show();
        fetch('/api/check-all', {method:'PUT'})
            .then(r => r.json()).then(res => {
                if (res.code === 200 && res.data) {
                    const p = res.data;
                    document.getElementById('progressBar').style.width = '100%';
                    document.getElementById('progressText').textContent = '✅ 完成: 共 ' + p.total + ' 条，成功 ' + p.successCount + ' 条，失败 ' + p.failCount + ' 条';
                    loadData(1);
                } else { document.getElementById('progressText').textContent = '❌ ' + (res.message || '检测失败'); }
            }).catch(() => { document.getElementById('progressText').textContent = '❌ 网络错误'; });
    }

    function deleteOne(id) {
        if (!confirm('确定删除该视频记录？')) return;
        fetch('/api/delete/' + id, {method:'DELETE'})
            .then(r => r.json()).then(res => { showToast(res.message||'删除成功', res.code===200?'success':'danger'); loadData(currentPage); })
            .catch(() => showToast('删除失败','danger'));
    }

    function search() {
        currentKeyword = document.getElementById('searchInput').value.trim();
        const url = new URL(window.location);
        if (currentKeyword) url.searchParams.set('keyword', currentKeyword); else url.searchParams.delete('keyword');
        window.history.replaceState({}, '', url);
        loadData(1);
    }

    function showToast(message, type) {
        const icons = { success:'bi-check-circle-fill', danger:'bi-x-circle-fill', warning:'bi-exclamation-circle-fill', info:'bi-info-circle-fill' };
        const colors = { success:'#34d399', danger:'#f87171', warning:'#fbbf24', info:'#6c8cff' };
        const c = colors[type] || '#6c8cff';
        const ic = icons[type] || 'bi-info-circle-fill';
        const id = 't-' + Date.now();
        const html = `<div id="${id}" class="toast toast-custom align-items-center border-0" role="alert" style="background:rgba(26,29,46,0.96);color:#e1e4ea;">
            <div class="d-flex align-items-center gap-2">
                <i class="bi ${ic}" style="color:${c};font-size:18px;"></i>
                <div class="toast-body" style="padding:0;">${message}</div>
                <button type="button" class="btn-close btn-close-white ms-2" style="font-size:12px;opacity:0.5;" data-bs-dismiss="toast"></button>
            </div>
        </div>`;
        document.getElementById('toastContainer').insertAdjacentHTML('beforeend', html);
        const el = document.getElementById(id);
        new bootstrap.Toast(el, {delay:3000}).show();
        el.addEventListener('hidden.bs.toast', () => el.remove());
    }

    function escapeHtml(text) {
        if (!text) return '';
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    // ===== 播放功能 =====
    var currentPlayer = null;

    function playVideo(id) {
        var info = videoMap[id];
        if (!info) { showToast('视频信息丢失', 'warning'); return; }
        var videoUrl = info.videoUrl;
        var title = info.title || '未命名';
        document.getElementById('playModalLabel').textContent = title;

        var modal = new bootstrap.Modal(document.getElementById('playModal'));
        modal.show();

        var video = document.getElementById('playModalVideo');
        // 等待模态框渲染完毕
        setTimeout(function() {
            destroyPlayer();
            if (videoUrl.indexOf('.m3u8') > 0) {
                var proxyUrl = '/proxy/m3u8?url=' + encodeURIComponent(videoUrl) + '&title=' + encodeURIComponent(title);
                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    var hls = new Hls();
                    hls.loadSource(proxyUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        setTimeout(function() { initPlyr(video); }, 100);
                    });
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            console.error('HLS 播放失败:', data.type, data.details);
                            hls.destroy();
                            video.src = proxyUrl;
                            initPlyr(video);
                        }
                    });
                    // 超时回退
                    setTimeout(function() {
                        if (!window._hlsReady) { hls.destroy(); video.src = proxyUrl; initPlyr(video); }
                    }, 10000);
                } else {
                    video.src = proxyUrl;
                    initPlyr(video);
                }
            } else {
                video.src = videoUrl;
                initPlyr(video);
            }
        }, 200);
    }

    function initPlyr(video) {
        if (typeof Plyr === 'undefined') {
            video.controls = true;
            return;
        }
        try {
            currentPlayer = new Plyr(video, {
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 3, 4] },
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                keyboard: { focused: true, global: true },
                tooltips: { controls: true, seek: true },
                resetOnEnd: true
            });
        } catch(e) {
            console.warn('Plyr 初始化失败:', e);
            video.controls = true;
        }
    }

    function destroyPlayer() {
        if (currentPlayer) {
            try { currentPlayer.destroy(); } catch(e) {}
            currentPlayer = null;
        }
        var video = document.getElementById('playModalVideo');
        video.removeAttribute('src');
        video.load();
    }

    // ===== 缓存功能 =====

    function startCache(id) {
        var info = videoMap[id];
        if (!info) return;
        var btn = document.getElementById('cache-btn-' + id);
        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; }

        // 初始化进度跟踪
        cacheProgress[id] = { lastTotal: 0, lastCached: 0, stalledSince: null, retryCount: 0, isRetrying: false };

        // 调用 POST /api/cache/start
        var url = '/api/cache/start?videoUrl=' + encodeURIComponent(info.videoUrl)
                + '&title=' + encodeURIComponent(info.title || '')
                + '&id=' + id;
        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, 5000);
        fetch(url, { method: 'POST', signal: controller.signal })
            .then(function(r) { clearTimeout(timeoutId); return r.json(); })
            .then(function(data) {
                if (data.started) {
                    showToast('缓存已启动', 'success');
                    if (isMobile) {
                        // 手机：toast 提示 + 短暂显示"已提交"后恢复按钮
                        if (btn) { btn.innerHTML = '<i class="bi bi-check"></i> 已提交'; }
                        setTimeout(function() {
                            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-download"></i>缓存'; }
                        }, 2000);
                        delete cacheProgress[id];
                    } else {
                        // PC：显示缓存中 + 启动轮询
                        if (btn) { btn.innerHTML = '<i class="bi bi-cloud-download"></i> 缓存中…'; }
                        if (!cachePollTimers[id]) {
                            cachePollTimers[id] = setInterval(function() { pollCacheStatus(id); }, 5000);
                        }
                        pollCacheStatus(id);
                    }
                } else {
                    showToast(data.error || '缓存启动失败', 'danger');
                    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-download"></i>缓存'; }
                    delete cacheProgress[id];
                }
            })
            .catch(function() {
                clearTimeout(timeoutId);
                showToast('缓存请求超时或失败', 'warning');
                // 即使超时也启动轮询，后台任务可能仍在执行
                if (!isMobile && !cachePollTimers[id]) {
                    cachePollTimers[id] = setInterval(function() { pollCacheStatus(id); }, 5000);
                }
                if (!isMobile) { pollCacheStatus(id); }
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-download"></i>缓存'; }
            });
    }

    function stopCachePoll(id) {
        if (cachePollTimers[id]) {
            clearInterval(cachePollTimers[id]);
            delete cachePollTimers[id];
        }
        if (cacheProgress[id]) {
            delete cacheProgress[id];
        }
    }

    function pollCacheStatus(id) {
        var info = videoMap[id];
        if (!info) { stopCachePoll(id); return; }

        // 正在重试中，跳过本次轮询避免干扰
        if (cacheProgress[id] && cacheProgress[id].isRetrying) return;

        var url = '/api/cache/status?videoUrl=' + encodeURIComponent(info.videoUrl)
                + '&title=' + encodeURIComponent(info.title || '')
                + '&id=' + id;
        fetch(url)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var display = document.getElementById('cache-display-' + id);
                if (!display) { stopCachePoll(id); return; }

                // 确保 cacheProgress 存在
                if (!cacheProgress[id]) {
                    cacheProgress[id] = { lastTotal: 0, lastCached: 0, stalledSince: null, retryCount: 0, isRetrying: false };
                }
                var prog = cacheProgress[id];

                // 情况 1：缓存完成
                if (data.finished || (data.total > 0 && data.cached === data.total)) {
                    display.innerHTML = '<span style="color:#34d399;font-size:12px;"><i class="bi bi-check-circle-fill me-1"></i>已缓存</span>';
                    stopCachePoll(id);
                    return;
                }

                // 情况 2：total === 0（m3u8 未解析或正在拉取）
                if (!data || data.total === 0) {
                    display.innerHTML = '<div class="cache-bar-mini"><span class="label" style="color:#fbbf24;"><i class="bi bi-hourglass-split"></i> 等待中…</span></div>';
                    checkStall(id, data);
                    return;
                }

                // 情况 3：total > 0，显示进度条
                var pct = Math.round(data.cached / data.total * 100);
                var mb = (data.cachedBytes / 1048576).toFixed(1);
                display.innerHTML = '<div class="cache-bar-mini"><div class="track"><div class="fill" style="width:' + pct + '%;"></div></div><span class="label"><span class="num">' + data.cached + '/' + data.total + '</span> <span style="color:#6a6f85;font-size:11px;">' + mb + 'MB</span></span></div>';

                // 进度有增长 → 重置停滞计时
                if (data.cached > prog.lastCached) {
                    prog.lastCached = data.cached;
                    prog.lastTotal = data.total;
                    prog.stalledSince = null;
                } else if (prog.stalledSince === null) {
                    // 第一次检测到无进度
                    prog.stalledSince = Date.now();
                    prog.lastTotal = data.total;
                } else {
                    // 检查是否停滞超时
                    checkStall(id, data);
                }
            })
            .catch(function() {});
    }

    /** 检查缓存进度是否停滞超过 20 秒，若是则自动重试 */
    function checkStall(id, data) {
        var prog = cacheProgress[id];
        if (!prog || prog.isRetrying) return;
        if (prog.stalledSince === null) {
            prog.stalledSince = Date.now();
            return;
        }
        var elapsed = Date.now() - prog.stalledSince;
        if (elapsed >= 20000) {
            cacheRetry(id);
        } else if (elapsed >= 15000) {
            // 最后 5 秒显示倒计时
            var remaining = Math.ceil((20000 - elapsed) / 1000);
            var display = document.getElementById('cache-display-' + id);
            if (display) {
                display.innerHTML = '<div class="cache-bar-mini"><span class="label" style="color:#fbbf24;"><i class="bi bi-arrow-repeat"></i> ' + remaining + 's后重试…</span></div>';
            }
        }
    }

    /** 自动重试缓存：清 m3u8 缓存 → 重新拉取 → 更新状态 */
    function cacheRetry(id) {
        var info = videoMap[id];
        if (!info) return;
        var prog = cacheProgress[id];
        if (!prog) return;

        prog.retryCount++;
        if (prog.retryCount >= 3) {
            var display = document.getElementById('cache-display-' + id);
            if (display) {
                display.innerHTML = '<span style="color:#f87171;font-size:12px;"><i class="bi bi-exclamation-circle"></i> 缓存失败，请<a href="javascript:location.reload()" style="color:#6c8cff;">刷新</a></span>';
            }
            stopCachePoll(id);
            return;
        }

        prog.isRetrying = true;
        prog.stalledSince = null;

        var display = document.getElementById('cache-display-' + id);
        if (display) {
            display.innerHTML = '<div class="cache-bar-mini"><span class="label" style="color:#fbbf24;"><i class="bi bi-arrow-repeat"></i> 重试中…(' + prog.retryCount + '/3)</span></div>';
        }

        var url = '/api/cache/retry?videoUrl=' + encodeURIComponent(info.videoUrl)
                + '&title=' + encodeURIComponent(info.title || '')
                + '&id=' + id;
        fetch(url, { method: 'POST' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                prog.isRetrying = false;
                // 用新状态立即更新 UI
                var d = document.getElementById('cache-display-' + id);
                if (d && data) {
                    if (data.total > 0) {
                        var pct = Math.round(data.cached / data.total * 100);
                        d.innerHTML = '<div class="cache-bar-mini"><div class="track"><div class="fill" style="width:' + pct + '%;"></div></div><span class="label"><span class="num">' + data.cached + '/' + data.total + '</span></span></div>';
                        prog.lastCached = data.cached;
                        prog.lastTotal = data.total;
                    } else {
                        d.innerHTML = '<div class="cache-bar-mini"><span class="label" style="color:#fbbf24;"><i class="bi bi-hourglass-split"></i> 等待中…</span></div>';
                    }
                }
            })
            .catch(function() {
                prog.isRetrying = false;
            });
    }
</script>
</body>
</html>
