                showToast(res.message || '保存失败', 'danger');
            }
        }).catch(() => showToast('请求失败', 'danger'));
    }

    function openGroupList() {
        renderGroupList();
        new bootstrap.Modal(document.getElementById('groupListModal')).show();
    }

    function renderGroupList() {
        var content = document.getElementById('groupListContent');
        content.innerHTML = '<p style="color:#94a3b8;text-align:center;">加载中...</p>';
        fetch('/api/group/list')
            .then(r => r.json())
            .then(res => {
                if (res.code !== 200 || !res.data) {
                    content.innerHTML = '<p style="color:#dc2626;text-align:center;">加载失败</p>';
                    return;
                }
                if (res.data.length === 0) {
                    content.innerHTML = '<p style="color:#94a3b8;text-align:center;">暂无合集，点击下方按钮新建</p>';
                    return;
                }
                content.innerHTML = '<div style="display:flex;flex-direction:column;gap:8px;">' +
                    res.data.map(function(g) {
                        var delConfirm = 'onclick="deleteGroup(' + g.id + ',\'' + escapeHtml(g.name) + '\',' + g.videoCount + ')"';
                        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;">' +
                            '<div><strong style="font-size:14px;">' + escapeHtml(g.name) + '</strong>' +
                            '<span style="font-size:12px;color:#94a3b8;margin-left:10px;">' + (g.videoCount||0) + ' 个视频</span></div>' +
                            '<div class="action-group">' +
                            '<button class="btn-action view" onclick="openGroupEdit(' + g.id + ',\'' + escapeHtml(g.name).replace(/'/g,"\\'") + '\',\'' + escapeHtml(g.description||'').replace(/'/g,"\\'") + '\')"><i class="bi bi-pencil"></i>编辑</button>' +
                            '<button class="btn-action del" ' + delConfirm + '><i class="bi bi-trash3"></i>删除</button>' +
                            '</div></div>';
                    }).join('') + '</div>';
            })
            .catch(function() { content.innerHTML = '<p style="color:#dc2626;text-align:center;">加载失败</p>'; });
    }

    function deleteGroup(id, name, videoCount) {
        var msg = '确定删除合集 "' + name + '"?';
        if (videoCount > 0) {
            msg = '合集 "' + name + '" 内有 ' + videoCount + ' 个视频\n';
            msg += '☐ 同时删除合集内所有视频？\n（取消则视频保留，仅解除关联）';
        }
        // 使用 confirm + 自定义对话框太复杂，用两次 confirm
        if (!confirm('确定删除合集 "' + name + '"？')) return;
        var deleteVideos = false;
        if (videoCount > 0) {
            deleteVideos = confirm('合集内有 ' + videoCount + ' 个视频，是否同时删除这些视频？\n\n确定=删除视频  取消=仅解除关联');
        }
        fetch('/api/group/' + id + '?deleteVideos=' + deleteVideos, {method:'DELETE'})
            .then(r => r.json()).then(res => {
                showToast(res.message || '删除成功', res.code === 200 ? 'success' : 'danger');
                loadGroups();
                loadData(currentPage);
                renderGroupList();
            }).catch(() => showToast('删除失败', 'danger'));
    }

    // ===== 视频源管理 =====

    function openSourceMgr() {
        window.location.href = '/sources';
    }

    // ===== 总搜索 =====

    var globalSources = [];     // [{id, name}]
    var globalSearchData = {};  // sourceId → {source, results}
    var globalSelected = {};    // key "sourceId:url" → true

    function openGlobalSearch() {
        document.getElementById('globalSearchInput').value = '';
        document.getElementById('globalSearchResults').innerHTML = '<p style="color:#94a3b8;text-align:center;padding:20px;">输入关键词开始搜索</p>';
        document.getElementById('globalImportBtn').style.display = 'none';
        document.getElementById('globalSearchSelected').textContent = '';
        loadGlobalSearchSources();
        new bootstrap.Modal(document.getElementById('globalSearchModal')).show();
    }

    function loadGlobalSearchSources() {
        var container = document.getElementById('globalSearchSources');
        fetch('/api/source/list')
            .then(r => r.json())
            .then(function(res) {
                if (res.code !== 200 || !res.data || res.data.length === 0) {
                    container.innerHTML = '<span style="color:#94a3b8;font-size:12px;">暂无视频源，请先添加</span>';
                    return;
                }
                globalSources = res.data.map(function(s) { return {id: s.id, name: s.name}; });
                container.innerHTML = '<label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;color:#3b82f6;margin-right:4px;" title="全选/取消">' +
                    '<input type="checkbox" id="globalSourceToggle" checked onchange="toggleAllGlobalSources()" style="accent-color:#3b82f6;"> 全选</label>' +
                    globalSources.map(function(s) {
                        return '<label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;padding:2px 8px;background:#ffffff;border:1px solid #e2e8f0;border-radius:6px;">' +
                            '<input type="checkbox" class="global-source-cb" data-sid="' + s.id + '" checked onchange="updateGlobalSourceToggle()" style="accent-color:#3b82f6;"> ' +
                            escapeHtml(s.name) + '</label>';
                    }).join('');
            })
            .catch(function() {
                container.innerHTML = '<span style="color:#dc2626;font-size:12px;">加载失败</span>';
            });
    }

    function toggleAllGlobalSources() {
        var checked = document.getElementById('globalSourceToggle').checked;
        document.querySelectorAll('.global-source-cb').forEach(function(cb) { cb.checked = checked; });
    }

    function updateGlobalSourceToggle() {
        var all = document.querySelectorAll('.global-source-cb');
        var checkedAll = true;
        all.forEach(function(cb) { if (!cb.checked) checkedAll = false; });
        document.getElementById('globalSourceToggle').checked = checkedAll;
    }

    function getSelectedSourceIds() {
        var ids = [];
        document.querySelectorAll('.global-source-cb:checked').forEach(function(cb) {
            ids.push(parseInt(cb.getAttribute('data-sid')));
        });
        return ids;
    }

    function doGlobalSearch() {
        var keyword = document.getElementById('globalSearchInput').value.trim();
        if (!keyword) { showToast('请输入关键词', 'warning'); return; }
        var sourceIds = getSelectedSourceIds();
        if (sourceIds.length === 0) { showToast('请至少选择一个视频源', 'warning'); return; }
        var results = document.getElementById('globalSearchResults');
        results.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:20px;"><span class="spinner-border spinner-border-sm me-2"></span>正在搜索 ' + sourceIds.length + ' 个视频源...</p>';
        document.getElementById('globalImportBtn').style.display = 'none';
        document.getElementById('globalSearchSelected').textContent = '';
        globalSearchData = {};
        globalSelected = {};

        fetch('/api/episode/search-all', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({keyword: keyword, sourceIds: sourceIds})
        }).then(r => r.json()).then(res => {
            if (res.code !== 200 || !res.data) {
                results.innerHTML = '<p style="color:#dc2626;text-align:center;">搜索失败</p>';
                return;
            }
            var data = res.data;
            var hasResults = false;
            var html = '';
            for (var sid in data) {
                var sr = data[sid];
                var source = sr.source;
                var items = sr.results;
                if (!items || items.length === 0) continue;
                hasResults = true;
                globalSearchData[sid] = sr;
                html += '<div style="margin-bottom:14px;">' +
                    '<div style="font-size:13px;font-weight:600;color:#475569;margin-bottom:8px;display:flex;align-items:center;gap:6px;">' +
                    '<span style="background:#3b82f6;color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;">源</span> ' +
                    escapeHtml(source.name) + ' <span style="color:#94a3b8;font-weight:400;">(' + items.length + ' 条)</span></div>';
                items.forEach(function(item, idx) {
                    var key = sid + ':' + item.url;
                    html += '<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:background 0.15s;" ' +
                        'onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'\'">' +
                        '<input type="checkbox" class="global-checkbox" data-key="' + key + '" data-sid="' + sid + '" data-url="' + escapeHtml(item.url) + '" ' +
                        'data-title="' + escapeHtml(item.title || '') + '" onchange="updateGlobalSelected()">' +
                        '<span style="font-size:14px;color:#1e293b;">' + escapeHtml(item.title || '未命名') + '</span>' +
                        '<span style="font-size:12px;color:#94a3b8;margin-left:auto;">' + escapeHtml(item.url.length > 40 ? item.url.substring(0,40)+'...' : item.url) + '</span>' +
                        '</label>';
                });
                html += '</div>';
            }
            if (!hasResults) {
                results.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:20px;">未找到相关结果</p>';
            } else {
                results.innerHTML = html;
            }
        }).catch(function() {
            results.innerHTML = '<p style="color:#dc2626;text-align:center;">搜索请求失败</p>';
        });
    }

    function updateGlobalSelected() {
        var checked = document.querySelectorAll('.global-checkbox:checked');
        var btn = document.getElementById('globalImportBtn');
        var info = document.getElementById('globalSearchSelected');
        if (checked.length > 0) {
            btn.style.display = 'inline-flex';
            info.textContent = '已选 ' + checked.length + ' 个';
        } else {
            btn.style.display = 'none';
            info.textContent = '';
        }
    }

    function globalImportSelected() {
        var checked = document.querySelectorAll('.global-checkbox:checked');
        if (checked.length === 0) { showToast('请选择要导入的剧集', 'warning'); return; }
        // 对于每个选中的结果，跳转到导入向导或直接创建合集
        // 简化：先选择一个，打开批量导入向导
        var first = checked[0];
        var sourceId = first.getAttribute('data-sid');
        var url = first.getAttribute('data-url');
        var title = first.getAttribute('data-title');

        bootstrap.Modal.getInstance(document.getElementById('globalSearchModal')).hide();
        // 跳转到批量导入页
        openBatchImportWithUrl(sourceId, url, title, null);
    }

    // ===== 批量导入向导 =====

    var importState = { step: 1, sourceId: null, seriesUrl: '', seriesTitle: '', episodes: [], selectedEpisodes: [], groupId: null };

    function openBatchImport() {
        importState = { step: 1, sourceId: null, seriesUrl: '', seriesTitle: '', episodes: [], selectedEpisodes: [], groupId: null };
        renderImportStep1();
        new bootstrap.Modal(document.getElementById('batchImportModal')).show();
    }

    function openBatchImportWithUrl(sourceId, url, title, groupId) {
        importState = { step: 1, sourceId: sourceId || null, seriesUrl: url || '', seriesTitle: title || '', episodes: [], selectedEpisodes: [], groupId: groupId || null };
        renderImportStep1();
        var modal = new bootstrap.Modal(document.getElementById('batchImportModal'));
        modal.show();
        // 自动跳到步骤2（有 sourceId 时）
        if (sourceId) {
            setTimeout(function() { doParseEpisodes(); }, 300);
        }
    }

    function renderImportStep1() {
        document.getElementById('importStepTitle').innerHTML = '<i class="bi bi-upload me-2"></i>批量导入 - 选择视频源';
        // 加载视频源和合集列表
        Promise.all([
            fetch('/api/source/list').then(r => r.json()),
            fetch('/api/group/list').then(r => r.json())
        ]).then(function(responses) {
            var sourcesRes = responses[0], groupsRes = responses[1];
            var sources = sourcesRes.code === 200 ? sourcesRes.data : [];
            var groups = groupsRes.code === 200 ? groupsRes.data : [];
            var body = document.getElementById('importStepBody');
            var html = '<div class="mb-3"><label style="font-size:13px;color:#64748b;margin-bottom:4px;">视频源</label>' +
                '<select id="importSourceSelect" class="form-control input-glass">' +
                '<option value="">-- 选择视频源 --</option>';
            sources.forEach(function(s) {
                var sel = importState.sourceId == s.id ? 'selected' : '';
                html += '<option value="' + s.id + '" ' + sel + '>' + escapeHtml(s.name) + '</option>';
            });
            html += '</select></div>';
            html += '<div class="mb-3"><label style="font-size:13px;color:#64748b;margin-bottom:4px;">剧集主页URL</label>' +
                '<input type="text" id="importUrlInput" class="form-control input-glass" placeholder="如 https://www.czltnl.com/nlu/1038/" value="' + escapeHtml(importState.seriesUrl) + '">' +
                '</div>';
            html += '<div class="mb-3"><label style="font-size:13px;color:#64748b;margin-bottom:4px;">目标合集</label>' +
                '<select id="importGroupSelect" class="form-control input-glass">';
            if (importState.groupId) {
                html += '<option value="__new">-- 新建合集 --</option>';
                groups.forEach(function(g) {
                    var sel = importState.groupId == g.id ? 'selected' : '';
                    html += '<option value="' + g.id + '" ' + sel + '>' + escapeHtml(g.name) + ' (' + (g.videoCount||0) + ')</option>';
                });
            } else {
                html += '<option value="__new" selected>-- 新建合集 --</option>';
                groups.forEach(function(g) {
                    html += '<option value="' + g.id + '">' + escapeHtml(g.name) + ' (' + (g.videoCount||0) + ')</option>';
                });
            }
            html += '</select></div>';
            html += '<div class="mb-3" id="importNewGroupNameWrap" style="display:' + (importState.groupId ? 'none' : 'block') + ';">' +
                '<label style="font-size:13px;color:#64748b;margin-bottom:4px;">新合集名称</label>' +
                '<input type="text" id="importNewGroupName" class="form-control input-glass" placeholder="如：狂飙" value="' + escapeHtml(importState.seriesTitle) + '">' +
                '</div>';
            body.innerHTML = html;

            // 切换合集/新建
            document.getElementById('importGroupSelect').onchange = function() {
                document.getElementById('importNewGroupNameWrap').style.display =
                    this.value === '__new' ? 'block' : 'none';
            };

            var footer = document.getElementById('importStepFooter');
            footer.innerHTML = '<button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" data-bs-dismiss="modal">取消</button>' +
                '<button type="button" class="btn btn-sm" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;" onclick="goImportStep2()">下一步 解析集数</button>';
        });
    }

    function goImportStep2() {
        importState.sourceId = document.getElementById('importSourceSelect').value;
        importState.seriesUrl = document.getElementById('importUrlInput').value.trim();
        if (!importState.sourceId) { showToast('请选择视频源', 'warning'); return; }
        if (!importState.seriesUrl) { showToast('请输入剧集主页URL', 'warning'); return; }
        // 保存合集选择
        var groupSelect = document.getElementById('importGroupSelect');
        if (groupSelect && groupSelect.value !== '__new') {
            importState.groupId = parseInt(groupSelect.value);
        } else {
            importState.groupId = null;
        }
        var newNameInput = document.getElementById('importNewGroupName');
        if (newNameInput) {
            importState.seriesTitle = newNameInput.value.trim();
        }
        doParseEpisodes();
    }

    function doParseEpisodes() {
        document.getElementById('importStepTitle').innerHTML = '<i class="bi bi-upload me-2"></i>正在解析集数...';
        var body = document.getElementById('importStepBody');
        body.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:30px;"><span class="spinner-border spinner-border-sm me-2"></span>正在抓取剧集主页...</p>';
        document.getElementById('importStepFooter').innerHTML = '';

        var url = '/api/episode/parse';
        fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({sourceId: importState.sourceId, seriesUrl: importState.seriesUrl})
        }).then(r => r.json()).then(res => {
            if (res.code === 200 && res.data) {
                importState.episodes = res.data;
                renderImportStep3();
            } else {
                body.innerHTML = '<p style="color:#dc2626;text-align:center;">解析失败: ' + escapeHtml(res.message || '未知错误') + '</p>';
                document.getElementById('importStepFooter').innerHTML = '<button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" onclick="renderImportStep1()">返回上一步</button>';
            }
        }).catch(function() {
            body.innerHTML = '<p style="color:#dc2626;text-align:center;">请求失败</p>';
            document.getElementById('importStepFooter').innerHTML = '<button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" onclick="renderImportStep1()">返回上一步</button>';
        });
    }

    function renderImportStep3() {
        document.getElementById('importStepTitle').innerHTML = '<i class="bi bi-upload me-2"></i>选择集数（共 ' + importState.episodes.length + ' 集）';
        var body = document.getElementById('importStepBody');
        var html = '';

        // 合集选择区域（紧凑模式）
        html += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;background:#f8fafc;padding:8px 12px;border-radius:8px;border:1px solid #e2e8f0;">' +
            '<label style="font-size:13px;color:#64748b;white-space:nowrap;">目标合集</label>' +
            '<select id="importGroupSelect3" class="form-control input-glass" style="width:auto;min-width:140px;padding:4px 8px;font-size:13px;">' +
            '<option value="__new">-- 新建合集 --</option>';
        // 加载合集列表
        fetch('/api/group/list').then(function(r) { return r.json(); }).then(function(res) {
            if (res.code === 200 && res.data) {
                var sel = document.getElementById('importGroupSelect3');
                res.data.forEach(function(g) {
                    var opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name + ' (' + (g.videoCount||0) + ')';
                    if (importState.groupId == g.id) opt.selected = true;
                    sel.appendChild(opt);
                });
            }
        }).catch(function() {});
        html += '</select>' +
            '<input type="text" id="importNewGroupName3" class="form-control input-glass" style="width:auto;min-width:120px;padding:4px 8px;font-size:13px;display:none;" placeholder="新合集名称" value="' + escapeHtml(importState.seriesTitle) + '">' +
            '</div>';

        // 快速选择工具条
        html += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">' +
            '<label style="font-size:13px;color:#64748b;">从</label>' +
            '<input type="number" id="importRangeFrom" class="search-input" style="width:70px;padding:4px 8px;" value="1">' +
            '<label style="font-size:13px;color:#64748b;">到</label>' +
            '<input type="number" id="importRangeTo" class="search-input" style="width:70px;padding:4px 8px;" value="' + importState.episodes.length + '">' +
            '<button class="btn-action" onclick="selectImportRange()"><i class="bi bi-check-square"></i>选中范围</button>' +
            '<button class="btn-action" onclick="selectAllImport()"><i class="bi bi-check-all"></i>全选</button>' +
            '<button class="btn-action del" onclick="clearImportSelection()"><i class="bi bi-x"></i>清除</button>' +
            '</div>';
        // 集数列表（显示前500集）
        var displayEps = importState.episodes.slice(0, 500);
        if (importState.episodes.length > 500) {
            html += '<p style="font-size:12px;color:#ca8a04;">仅显示前 500 集，使用范围选择来批量操作</p>';
        }
        html += '<div style="max-height:40vh;overflow-y:auto;border:1px solid #e2e8f0;border-radius:10px;">';
        displayEps.forEach(function(ep) {
            var epNum = ep.episodeNumber;
            var checked = importState.selectedEpisodes.indexOf(epNum) >= 0 ? 'checked' : '';
            html += '<label style="display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid #f1f5f9;cursor:pointer;font-size:13px;">' +
                '<input type="checkbox" class="import-ep-cb" value="' + epNum + '" ' + checked + '>' +
                '<span>' + (ep.text || '第' + epNum + '集') + '</span>' +
                '<span style="color:#94a3b8;font-size:11px;margin-left:auto;overflow:hidden;text-overflow:ellipsis;max-width:200px;white-space:nowrap;">' + escapeHtml(ep.url || '') + '</span>' +
                '</label>';
        });
        html += '</div>';
        body.innerHTML = html;

        // 合集选择切换事件
        var groupSel = document.getElementById('importGroupSelect3');
        groupSel.onchange = function() {
            document.getElementById('importNewGroupName3').style.display = this.value === '__new' ? 'inline-block' : 'none';
        };
        if (groupSel.value === '__new') {
            document.getElementById('importNewGroupName3').style.display = 'inline-block';
        } else {
            document.getElementById('importNewGroupName3').style.display = 'none';
        }

        var footer = document.getElementById('importStepFooter');
        footer.innerHTML = '<button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" onclick="renderImportStep1()">返回上一步</button>' +
            '<button type="button" class="btn btn-sm" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;" onclick="doBatchImport()">导入选中集数</button>';
    }

    function selectImportRange() {
        var from = parseInt(document.getElementById('importRangeFrom').value) || 1;
        var to = parseInt(document.getElementById('importRangeTo').value) || importState.episodes.length;
        var cbs = document.querySelectorAll('.import-ep-cb');
        cbs.forEach(function(cb) {
            var v = parseInt(cb.value);
            cb.checked = v >= from && v <= to;
        });
        updateImportSelection();
    }

    function selectAllImport() {
        document.querySelectorAll('.import-ep-cb').forEach(function(cb) { cb.checked = true; });
        updateImportSelection();
    }

    function clearImportSelection() {
        document.querySelectorAll('.import-ep-cb').forEach(function(cb) { cb.checked = false; });
        updateImportSelection();
    }

    function updateImportSelection() {
        importState.selectedEpisodes = [];
        document.querySelectorAll('.import-ep-cb:checked').forEach(function(cb) {
            importState.selectedEpisodes.push(parseInt(cb.value));
        });
    }

    function doBatchImport() {
        updateImportSelection();
        if (importState.selectedEpisodes.length === 0) {
            showToast('请至少选择一集', 'warning');
            return;
        }

        // 确定目标合集（优先用步骤3的选择器）
        var groupSelect = document.getElementById('importGroupSelect3') || document.getElementById('importGroupSelect');
        var groupId;
        if (groupSelect && groupSelect.value !== '__new') {
            groupId = parseInt(groupSelect.value);
        }
        // 回退到 importState
        if (!groupId && importState.groupId) {
            groupId = importState.groupId;
        }

        if (!groupId) {
            // 需要新建合集
            var newNameInput = document.getElementById('importNewGroupName3') || document.getElementById('importNewGroupName');
            var newName = newNameInput ? newNameInput.value.trim() : importState.seriesTitle;
            if (!newName) { showToast('请输入新合集名称', 'warning'); return; }
            // 先创建合集
            fetch('/api/group', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: newName})
            }).then(r => r.json()).then(function(res) {
                if (res.code === 200 && res.data) {
                    doImportWithGroup(res.data.id);
                } else {
                    showToast(res.message || '合集创建失败', 'danger');
                }
            }).catch(function() { showToast('请求失败', 'danger'); });
        } else {
            doImportWithGroup(groupId);
        }
    }

    function doImportWithGroup(groupId) {
        var episodes = [];
        importState.selectedEpisodes.forEach(function(epNum) {
            var found = importState.episodes.find(function(e) { return e.episodeNumber === epNum; });
            if (found) {
                episodes.push({episodeNumber: epNum, url: found.url});
            }
        });

        if (episodes.length === 0) {
            showToast('没有可导入的集数', 'warning');
            return;
        }

        var body = document.getElementById('importStepBody');
        body.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:30px;"><span class="spinner-border spinner-border-sm me-2"></span>正在导入 ' + episodes.length + ' 集...</p>';
        document.getElementById('importStepFooter').innerHTML = '';
        document.getElementById('importStepTitle').innerHTML = '<i class="bi bi-upload me-2"></i>正在导入...';

        fetch('/api/episode/import', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({groupId: groupId, episodes: episodes})
        }).then(r => r.json()).then(function(res) {
            if (res.code === 200 && res.data) {
                var d = res.data;
                body.innerHTML = '<div style="text-align:center;padding:20px;">' +
                    '<i class="bi bi-check-circle" style="font-size:48px;color:#16a34a;display:block;margin-bottom:12px;"></i>' +
                    '<p style="font-size:16px;font-weight:600;color:#1e293b;">导入完成</p>' +
                    '<p style="font-size:14px;color:#64748b;">成功: ' + d.successCount + ' | 跳过: ' + d.skippedCount + ' | 失败: ' + d.failCount + '</p>' +
                    '</div>';
                document.getElementById('importStepFooter').innerHTML =
                    '<button type="button" class="btn btn-sm" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;" data-bs-dismiss="modal" onclick="loadData(1);loadGroups();">完成</button>';
                loadGroups();
            } else {
                body.innerHTML = '<p style="color:#dc2626;text-align:center;">导入失败: ' + escapeHtml(res.message || '未知错误') + '</p>';
                document.getElementById('importStepFooter').innerHTML =
                    '<button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" data-bs-dismiss="modal">关闭</button>';
            }
        }).catch(function() {
            body.innerHTML = '<p style="color:#dc2626;text-align:center;">请求失败</p>';
            document.getElementById('importStepFooter').innerHTML =
                '<button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" data-bs-dismiss="modal">关闭</button>';
        });
    }

    // ===== 下一集检测 =====

    function checkNextEpisode(videoId) {
        var btn = document.getElementById('next-btn-' + videoId);
        var cell = document.getElementById('next-cell-' + videoId);
        if (btn) { btn.innerHTML = '<span class="spinner-border spinner-border-sm" style="width:12px;height:12px;"></span>'; btn.disabled = true; }

        fetch('/api/episode/next/' + videoId)
            .then(r => r.json())
            .then(function(res) {
                if (res.code === 200 && res.data) {
                    var d = res.data;
                    if (d.nextEpisodeNumber) {
                        if (d.message === '已收录') {
                            cell.innerHTML = '<span style="color:#16a34a;font-size:11px;" title="第' + d.nextEpisodeNumber + '集已收录">✔' + d.nextEpisodeNumber + '</span>';
                        } else if (d.nextUrl) {
                            cell.innerHTML = '<span style="color:#ca8a04;font-size:11px;cursor:pointer;" onclick="quickImportNext(' + videoId + ')" title="第' + d.nextEpisodeNumber + '集可导入">⏳' + d.nextEpisodeNumber + '</span>';
                        } else {
                            cell.innerHTML = '<span style="color:#94a3b8;font-size:11px;">-</span>';
                        }
                    } else {
                        cell.innerHTML = '<span style="color:#dc2626;font-size:11px;">✘</span>';
                    }
                } else {
                    if (btn) { btn.innerHTML = '<i class="bi bi-arrow-right-circle"></i>'; btn.disabled = false; }
                }
            })
            .catch(function() {
                if (btn) { btn.innerHTML = '<i class="bi bi-arrow-right-circle"></i>'; btn.disabled = false; }
            });
    }

    function quickImportNext(videoId) {
        // 跳转到详情页或执行快速导入
        window.location.href = '/detail/' + videoId;
    }
</script>
</body>
</html>
