<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'详情 - ' + ${record?.title ?: '视频收藏'}">视频详情</title>
    <link href="/lib/bootstrap-5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="/lib/bootstrap-icons-1.11.3/css/bootstrap-icons.min.css" rel="stylesheet">
    <script src="/lib/hls.js-1.5.17/hls.min.js"></script>
    <link href="/lib/plyr-3.7.8/plyr.css" rel="stylesheet">
    <style>
        * { font-family: system-ui, -apple-system, sans-serif; }

        /* 设计令牌 */
        :root {
            --c-primary: #2563eb;
            --c-primary-light: #3b82f6;
            --c-primary-dark: #1d4ed8;
            --c-gradient: linear-gradient(135deg, #4f46e5, #3b82f6);
            --c-ok: #10b981;
            --c-err: #ef4444;
            --c-mute: #94a3b8;
            --c-warn: #ca8a04;
            --t-title: 24px;
            --t-sub: 15px;
            --t-body: 14px;
            --t-small: 13px;
            --t-xs: 12px;
            --s-1: 8px;
            --s-2: 16px;
            --s-3: 24px;
            --s-4: 32px;
            --s-5: 40px;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }
        .app-container { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

        /* Plyr 暗色主题覆盖（保持暗色） */
        :root {
            --plyr-color-main: #3b82f6;
            --plyr-video-background: #0a0c14;
            --plyr-video-control-background-hover: rgba(255,255,255,0.08);
            --plyr-video-control-color: #e1e4ea;
            --plyr-video-control-color-hover: #fff;
            --plyr-range-thumb-background: #3b82f6;
            --plyr-range-track-background: rgba(255,255,255,0.15);
            --plyr-menu-background: rgba(20,22,40,0.96);
            --plyr-menu-color: #c8cdd8;
            --plyr-menu-border-color: rgba(255,255,255,0.08);
            --plyr-menu-arrow-color: #7a7f96;
            --plyr-tooltip-background: rgba(20,22,40,0.96);
            --plyr-tooltip-color: #c8cdd8;
            --plyr-control-icon-size: 18px;
            --plyr-control-spacing: 10px;
        }
        .plyr { border-radius: 0; }
        .plyr video { aspect-ratio: 16 / 9; }
        .plyr__control--overlaid { background: rgba(59,130,246,0.9) !important; }
        .plyr__control--overlaid:hover { background: #3b82f6 !important; }
        .plyr__menu__container .plyr__control[role="menuitemradio"][aria-checked="true"]::before { background: #3b82f6; }
        .plyr--video .plyr__progress__buffer { background: rgba(255,255,255,0.12); }

        /* 返回按钮 */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 18px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        .btn-back:hover { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; }

        /* 标题 */
        .detail-title {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        /* 视频播放器卡片（保持暗色） */
        .player-card {
            background: #0a0c14;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .player-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 20px;
            color: #94a3b8;
        }
        .player-placeholder i { font-size: 48px; margin-bottom: 16px; }
        .player-placeholder p { font-size: 15px; margin: 0; }

        /* 信息卡片 */
        .info-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 24px 28px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
        }
        .info-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 32px;
        }
        .info-item { }
        .info-label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 14px;
            color: #475569;
            word-break: break-all;
        }
        .info-value a { color: #3b82f6; text-decoration: none; }
        .info-value a:hover { text-decoration: underline; }
        .info-full { grid-column: 1 / -1; }

        /* 状态徽章 */
        .status-badge-lg {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-badge-lg .sd { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .sb-0 { background: rgba(148,163,184,0.08); color: #94a3b8; }
        .sb-0 .sd { background: #94a3b8; }
        .sb-1 { background: rgba(16,185,129,0.15); color: #10b981; }
        .sb-1 .sd { background: #10b981; }
        .sb-2 { background: rgba(239,68,68,0.12); color: #ef4444; }
        .sb-2 .sd { background: #ef4444; }
        .sb-3 { background: rgba(234,179,8,0.12); color: #ca8a04; }
        .sb-3 .sd { background: #ca8a04; }

        .latency-value {
            font-family: 'JetBrains Mono', monospace;
            color: #3b82f6;
            font-weight: 600;
        }

        /* 复制按钮 */
        .btn-copy {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 12px;
            color: #3b82f6;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 8px;
        }
        .btn-copy:hover { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.25); }
        .btn-copy.copied { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.2); color: #16a34a; }

        /* 缓存进度条 */
        .cache-bar-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 2px;
        }
        .cache-bar {
            flex: 1;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            max-width: 160px;
        }
        .cache-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #22c55e);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .cache-label {
            font-size: 12px;
            color: #64748b;
            white-space: nowrap;
        }
        .cache-label .num { color: #1e293b; font-weight: 600; }

        /* 备注输入 */
        .remark-input {
            background: #ffffff !important;
            border: 1px solid #d1d5db !important;
            border-radius: 10px !important;
            padding: 10px 14px !important;
            color: #374151 !important;
            font-size: 14px !important;
            transition: all 0.2s;
        }
        .remark-input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 3px rgba(59,130,246,0.15) !important; }

        .btn-save-remark {
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: 10px;
            padding: 10px 16px;
            color: #3b82f6;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-save-remark:hover { background: rgba(59,130,246,0.15); color: #2563eb; }

        /* 操作按钮组 */
        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-action-primary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 11px 22px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
        }
        .btn-action-primary:disabled { opacity: 0.6; }
        .btn-recheck {
            background: rgba(234,179,8,0.1);
            color: #ca8a04;
        }
        .btn-recheck:hover:not(:disabled) { background: rgba(234,179,8,0.18); }
        .btn-delete {
            background: rgba(239,68,68,0.1);
            color: #dc2626;
        }
        .btn-delete:hover { background: rgba(239,68,68,0.18); }
        .btn-download {
            background: rgba(34,197,94,0.1);
            color: #16a34a;
        }
        .btn-download:hover { background: rgba(34,197,94,0.18); }

        /* Toast */
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; }
        .toast-custom {
            border-radius: 12px;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            background: #ffffff !important;
            color: #1e293b !important;
            font-size: 14px;
        }
        .toast-custom .toast-body { display: flex; align-items: center; gap: 8px; padding: 0; }

        @media (max-width: 768px) {
            .app-container { padding: 16px 12px; }
            .detail-title { font-size: 20px; margin-bottom: 16px; }
            .info-card { padding: 18px 18px; border-radius: 12px; }
            .info-grid { gap: 12px 24px; }
            .btn-back { padding: 8px 14px; font-size: 13px; }
            .info-card-title { font-size: 13px; }
            .info-label { font-size: 11px; }
            .info-value { font-size: 13px; }
        }
        @media (max-width: 640px) {
            .info-grid { grid-template-columns: 1fr; }
            .detail-title { font-size: 18px; }
            .action-bar { flex-direction: column; }
            .action-bar .btn-action-primary { width: 100%; justify-content: center; }
            .btn-action-primary { padding: 10px 16px; font-size: 13px; }
            .info-card-title { font-size: 13px; margin-bottom: 14px; }
            .info-label { font-size: 11px; }
            .info-value { font-size: 13px; }
            .player-card { border-radius: 10px; }
        }
        @media (max-width: 400px) {
            .app-container { padding: 10px 8px; }
            .detail-title { font-size: 16px; }
            .info-card { padding: 14px 12px; }
            .info-grid { gap: 10px; }
            .btn-back { padding: 8px 12px; font-size: 12px; border-radius: 8px; }
            .btn-action-primary { padding: 10px 16px; font-size: 13px; }
            .remark-input { padding: 8px 10px !important; font-size: 13px !important; }
            .btn-save-remark { padding: 8px 12px; font-size: 12px; }
            .status-badge-lg { font-size: 12px; padding: 5px 12px; }
            .latency-value { font-size: 13px; }
        }

        /* 移动端性能优化 */
        .btn-action-primary, .btn-back, .btn-save-remark, .btn-recheck, .btn-delete, .btn-download {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        @media (max-width: 768px) {
            .toast-custom { backdrop-filter: none !important; }
            .btn-back { transition: color 0.2s, background 0.2s; }
            .btn-action-primary { transition: color 0.2s, background 0.2s; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <a href="/" class="btn-back"><i class="bi bi-arrow-left"></i>返回列表</a>

    <div th:if="${record == null}" style="text-align:center;padding:60px 0;">
        <i class="bi bi-exclamation-triangle" style="font-size:40px;color:#dc2626;display:block;margin-bottom:12px;"></i>
        <p style="color:#94a3b8;">记录不存在或已被删除</p>
    </div>

    <div th:if="${record != null}">
        <h1 class="detail-title" th:text="${record.title}">视频标题</h1>

        <!-- 播放器 -->
        <div class="player-card">
            <div th:if="${record.status == 1}" id="playerWrapper">
                <video id="videoPlayer" muted playsinline></video>
            </div>
            <div class="player-placeholder" th:if="${record.status != 1}">
                <i class="bi" th:classappend="${record.status == 2} ? 'bi-x-circle' : (${record.status == 0} ? 'bi-clock' : 'bi-exclamation-triangle')"></i>
                <p th:if="${record.status == 2}">该视频不可播放</p>
                <p th:if="${record.status == 0}">尚未检测</p>
                <p th:if="${record.status == 3}">解析失败</p>
            </div>
        </div>

        <!-- 信息卡片 -->
        <div class="info-card">
            <div class="info-card-title"><i class="bi bi-info-circle"></i>详细信息</div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">标题</div>
                    <div class="info-value" th:text="${record.title}">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">网页标题</div>
                    <div class="info-value" th:text="${record.pageTitle ?: '-'}">-</div>
                </div>
                <div class="info-item" id="groupInfoRow" style="display:none;">
                    <div class="info-label">合集</div>
                    <div class="info-value" id="groupInfoValue">-</div>
                </div>
                <div class="info-item" id="episodeInfoRow" style="display:none;">
                    <div class="info-label">集数</div>
                    <div class="info-value" id="episodeInfoValue">-</div>
                </div>
                <div class="info-item info-full">
                    <div class="info-label">来源网址</div>
                    <div class="info-value"><a th:href="${record.sourceUrl}" target="_blank" th:text="${record.sourceUrl}">-</a></div>
                </div>
                <div class="info-item info-full">
                    <div class="info-label">
                        视频地址
                        <span class="btn-copy" id="copyBtn" onclick="copyUrl()"><i class="bi bi-files"></i>复制</span>
                    </div>
                    <div class="info-value" style="display:flex;align-items:center;gap:4px;">
                        <span style="color:#3b82f6;font-size:13px;" th:text="${record.videoUrl.length() > 60 ? record.videoUrl.substring(0,60) + '...' : record.videoUrl}">-</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">状态</div>
                    <div class="info-value">
                        <span th:if="${record.status == 0}" class="status-badge-lg sb-0"><span class="sd"></span>未检测</span>
                        <span th:if="${record.status == 1}" class="status-badge-lg sb-1"><span class="sd"></span>可播放</span>
                        <span th:if="${record.status == 2}" class="status-badge-lg sb-2"><span class="sd"></span>不可播放</span>
                        <span th:if="${record.status == 3}" class="status-badge-lg sb-3"><span class="sd"></span>解析失败</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-label">延迟</div>
                    <div class="info-value"><span class="latency-value" th:text="${record.latencyMs != null ? record.latencyMs + 'ms' : '-'}">-</span></div>
                </div>
                <div class="info-item">
                    <div class="info-label">收录时间</div>
                    <div class="info-value" style="color:#94a3b8;font-size:13px;" th:text="${record.createdAt}">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">最后更新</div>
                    <div class="info-value" style="color:#94a3b8;font-size:13px;" th:text="${record.updatedAt}">-</div>
                </div>
                <div class="info-item info-full">
                    <div class="info-label">备注</div>
                    <div class="info-value">
                        <div class="input-group">
                            <input type="text" id="remarkInput" class="form-control remark-input" th:value="${record.remark}">
                            <button class="btn-save-remark" onclick="saveRemark(${record.id})">保存</button>
                        </div>
                    </div>
                </div>
                <!-- 缓存状态（仅 m3u8 显示） -->
                <div class="info-item info-full" id="cacheStatusRow" style="display:none;">
                    <div class="info-label">缓存状态</div>
                    <div class="info-value" id="cacheStatusValue">—</div>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-bar">
            <button class="btn-action-primary btn-download" th:onclick="'downloadVideo(' + ${record.id} + ')'">
                <i class="bi bi-download"></i>下载
            </button>
            <button class="btn-action-primary btn-recheck" th:onclick="'recheck(' + ${record.id} + ')'">
                <i class="bi bi-arrow-repeat"></i>重新检测
            </button>
            <button class="btn-action-primary" style="background:rgba(59,130,246,0.08);color:#3b82f6;" th:onclick="'moveToGroup(' + ${record.id} + ')'">
                <i class="bi bi-folder"></i>合集
            </button>
            <button class="btn-action-primary" style="background:rgba(234,179,8,0.1);color:#ca8a04;" th:onclick="'checkNextEpisode(' + ${record.id} + ')'">
                <i class="bi bi-arrow-right-circle"></i>下集
            </button>
            <button class="btn-action-primary btn-delete" th:onclick="'deleteRecord(' + ${record.id} + ')'">
                <i class="bi bi-trash3"></i>删除记录
            </button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/lib/bootstrap-5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/lib/plyr-3.7.8/plyr.js"></script>
<script th:inline="javascript">
    var isMobile = /Mobi|Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
    // Plyr + HLS 播放器初始化
    (function() {
        var videoUrl = [[${record.videoUrl}]];
        var video = document.getElementById('videoPlayer');
        if (!video || !videoUrl) return;

        var plyrOptions = {
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 3, 4] },
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
            keyboard: { focused: true, global: true },
            tooltips: { controls: true, seek: true },
            resetOnEnd: true
        };

        if (typeof Plyr === 'undefined') {
            console.warn('Plyr 加载失败，使用原生播放器');
            return;
        }

        var videoTitle = encodeURIComponent([[${record.title}]]);

        if (videoUrl && videoUrl.indexOf('.m3u8') > 0) {
            var proxyUrl = '/proxy/m3u8?url=' + encodeURIComponent(videoUrl) + '&title=' + videoTitle;
            if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(proxyUrl);
                hls.attachMedia(video);

                var hlsReady = false;
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    hlsReady = true;
                    setTimeout(function() {
                        window.player = new Plyr(video, plyrOptions);
                        video.play();
                    }, 100);
                });
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        console.error('HLS 播放失败:', data.type, data.details);
                        var errMsg = '视频流加载失败 (' + data.type + ')';
                        if (data.response) {
                            errMsg += ' HTTP ' + data.response.code;
                        }
                        showToast(errMsg, 'danger');
                        hls.destroy();
                    }
                });
                setTimeout(function() {
                    if (!hlsReady) {
                        console.warn('HLS 加载超时，使用原生播放器');
                        hls.destroy();
                        video.controls = true;
                        video.src = proxyUrl;
                    }
                }, 10000);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = proxyUrl;
                video.addEventListener('loadedmetadata', function() {
                    window.player = new Plyr(video, plyrOptions);
                    video.play();
                }, { once: true });
            }
        } else if (videoUrl) {
            video.src = videoUrl;
            window.player = new Plyr(video, plyrOptions);
            video.play();
        }
    })();

    // ===== 缓存状态（仅 m3u8 视频） =====
    (function() {
        var videoUrl = [[${record.videoUrl}]];
        if (!videoUrl || videoUrl.indexOf('.m3u8') < 0) return;
        document.getElementById('cacheStatusRow').style.display = '';
        if (isMobile) {
            document.getElementById('cacheStatusValue').innerHTML = '<span style="color:#94a3b8;font-size:13px;">手机端跳过</span>';
            return;
        }
        var title = encodeURIComponent([[${record.title}]]);
        updateCacheStatus(videoUrl, title);
        window._cacheTimer = setInterval(function() { updateCacheStatus(videoUrl, title); }, 3000);
    })();

    function updateCacheStatus(url, title) {
        var val = document.getElementById('cacheStatusValue');
        var apiUrl = '/api/cache/status?videoUrl=' + encodeURIComponent(url) + '&title=' + title;
        fetch(apiUrl)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data || data.total === 0) return;
                var pct = Math.round(data.cached / data.total * 100);
                var mb = (data.cachedBytes / 1048576).toFixed(1);
                if (data.cached === data.total) {
                    val.innerHTML = '<div class="cache-bar-wrap"><span style="color:#16a34a;"><i class="bi bi-check-circle-fill"></i> 已全部缓存</span><span class="cache-label">' + mb + ' MB</span></div>';
                    clearInterval(window._cacheTimer);
                } else {
                    val.innerHTML = '<div class="cache-bar-wrap"><div class="cache-bar"><div class="cache-bar-fill" style="width:' + pct + '%;"></div></div><span class="cache-label"><span class="num">' + data.cached + '/' + data.total + '</span> ' + mb + ' MB</span></div>';
                }
            })
            .catch(function() {});
    }

    function copyUrl() {
        const url = [[${record.videoUrl}]];
        const btn = document.getElementById('copyBtn');
        navigator.clipboard.writeText(url).then(() => {
            btn.classList.add('copied');
            btn.innerHTML = '<i class="bi bi-check-lg"></i>已复制';
            setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '<i class="bi bi-files"></i>复制'; }, 2000);
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = url;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            btn.classList.add('copied');
            btn.innerHTML = '<i class="bi bi-check-lg"></i>已复制';
            setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '<i class="bi bi-files"></i>复制'; }, 2000);
        });
    }

    function saveRemark(id) {
        const remark = document.getElementById('remarkInput').value.trim();
        fetch('/api/remark/' + id + '?remark=' + encodeURIComponent(remark), {method:'PUT'})
            .then(r => r.json())
            .then(res => showToast(res.message || '备注已保存', res.code === 200 ? 'success' : 'danger'))
            .catch(() => showToast('保存失败', 'danger'));
    }

    function recheck(id) {
        var videoUrl = [[${record.videoUrl}]];
        var title = encodeURIComponent([[${record.title}]]);
        if (videoUrl && videoUrl.indexOf('.m3u8') > 0) {
            fetch('/api/cache/clear-m3u8?videoUrl=' + encodeURIComponent(videoUrl) + '&title=' + title);
        }
        var btn = event.target;
        if (btn.tagName !== 'BUTTON') btn = btn.closest('button');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>检测中...';
        fetch('/api/check/' + id, {method:'PUT'})
            .then(r => r.json())
            .then(res => {
                showToast(res.message || '检测完成', res.code === 200 ? 'success' : 'warning');
                setTimeout(() => location.reload(), 1000);
            })
            .catch(() => showToast('请求失败', 'danger'))
            .finally(() => { btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-repeat"></i>重新检测'; });
    }

    function deleteRecord(id) {
        if (!confirm('确定要删除该记录吗？')) return;
        fetch('/api/delete/' + id, {method:'DELETE'})
            .then(r => r.json())
            .then(res => {
                if (res.code === 200) { showToast('删除成功', 'success'); setTimeout(() => location.href = '/', 800); }
                else { showToast(res.message || '删除失败', 'danger'); }
            })
            .catch(() => showToast('删除失败', 'danger'));
    }

    // ===== 合集信息 =====
    (function() {
        var groupId = [[${record.groupId}]];
        var episodeNumber = [[${record.episodeNumber}]];
        if (groupId) {
            fetch('/api/group/' + groupId)
                .then(function(r) { return r.json(); })
                .then(function(res) {
                    if (res.code === 200 && res.data) {
                        document.getElementById('groupInfoRow').style.display = '';
                        document.getElementById('groupInfoValue').textContent = res.data.name;
                        document.getElementById('episodeInfoRow').style.display = '';
                        document.getElementById('episodeInfoValue').textContent = episodeNumber ? '第' + episodeNumber + '集' : '-';
                    }
                })
                .catch(function() {});
        }
    })();

    function moveToGroup(id) {
        fetch('/api/group/list')
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.code !== 200 || !res.data) { showToast('加载合集列表失败', 'danger'); return; }
                var groups = res.data;
                var html = '<div style="padding:10px 0;">';
                if (groups.length === 0) {
                    html += '<p style="color:#94a3b8;text-align:center;">暂无合集，请先在列表页创建</p>';
                } else {
                    groups.forEach(function(g) {
                        html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:8px;cursor:pointer;" ' +
                            'onclick="doMoveToGroup(' + id + ',' + g.id + ',\'' + (g.name||'').replace(/'/g,"\\'") + '\')">' +
                            '<div><strong style="font-size:14px;">' + (g.name||'') + '</strong>' +
                            '<span style="font-size:12px;color:#94a3b8;margin-left:10px;">' + (g.videoCount||0) + ' 个视频</span></div>' +
                            '<span style="color:#3b82f6;font-size:13px;">移动 →</span>' +
                            '</div>';
                    });
                }
                html += '<div style="text-align:center;margin-top:12px;"><button class="btn-action" onclick="doUnlinkVideo(' + id + ')"><i class="bi bi-folder-minus"></i> 从合集中移除</button></div>';
                html += '</div>';

                var modal = document.createElement('div');
                modal.className = 'modal fade modal-custom';
                modal.id = 'moveGroupModal';
                modal.innerHTML = '<div class="modal-dialog modal-dialog-centered"><div class="modal-content">' +
                    '<div class="modal-header"><h6 class="modal-title"><i class="bi bi-folder me-2"></i>移动到合集</h6>' +
                    '<button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>' +
                    '<div class="modal-body">' + html + '</div>' +
                    '<div class="modal-footer"><button type="button" class="btn btn-sm" style="background:#f1f5f9;color:#64748b;border:none;border-radius:8px;" data-bs-dismiss="modal">取消</button></div></div></div>';
                document.body.appendChild(modal);
                new bootstrap.Modal(modal).show();
                modal.addEventListener('hidden.bs.modal', function() { modal.remove(); });
            });
    }

    function doMoveToGroup(videoId, groupId, groupName) {
        fetch('/api/group/move-video', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({videoId: videoId, groupId: groupId})
        }).then(function(r) { return r.json(); }).then(function(res) {
            showToast(res.message || '移动成功', res.code === 200 ? 'success' : 'danger');
            var m = document.getElementById('moveGroupModal');
            if (m) { bootstrap.Modal.getInstance(m).hide(); }
            if (res.code === 200) { setTimeout(function() { location.reload(); }, 1000); }
        }).catch(function() { showToast('请求失败', 'danger'); });
    }

    function doUnlinkVideo(videoId) {
        if (!confirm('确定从合集中移除此视频？')) return;
        fetch('/api/group/unlink-video/' + videoId, {method: 'PUT'})
            .then(function(r) { return r.json(); }).then(function(res) {
                showToast(res.message || '已移除', res.code === 200 ? 'success' : 'danger');
                var m = document.getElementById('moveGroupModal');
                if (m) { bootstrap.Modal.getInstance(m).hide(); }
                if (res.code === 200) { setTimeout(function() { location.reload(); }, 1000); }
            }).catch(function() { showToast('请求失败', 'danger'); });
    }

    function checkNextEpisode(id) {
        fetch('/api/episode/next/' + id)
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.code === 200 && res.data) {
                    var d = res.data;
                    if (d.nextEpisodeNumber) {
                        if (d.message === '已收录') {
                            showToast('第 ' + d.nextEpisodeNumber + ' 集已收录', 'success');
                        } else if (d.nextUrl) {
                            if (confirm('发现第 ' + d.nextEpisodeNumber + ' 集（' + d.nextUrl + '）\n是否导入？')) {
                                var title = document.querySelector('.detail-title')?.textContent || '视频';
                                var baseTitle = title.replace(/第\d+集.*$/, '').trim();
                                if (!baseTitle) baseTitle = title;
                                var groupId = [[${record.groupId}]];
                                if (groupId) {
                                    fetch('/api/episode/import', {
                                        method: 'POST',
                                        headers: {'Content-Type': 'application/json'},
                                        body: JSON.stringify({
                                            groupId: groupId,
                                            episodes: [{episodeNumber: d.nextEpisodeNumber, url: d.nextUrl}]
                                        })
                                    }).then(function(r) { return r.json(); }).then(function(r) {
                                        showToast(r.message || '导入完成', r.code === 200 ? 'success' : 'danger');
                                        if (r.code === 200) setTimeout(function() { location.reload(); }, 1000);
                                    });
                                } else {
                                    showToast('该视频不在合集中，请先添加到合集', 'warning');
                                }
                            }
                        } else {
                            showToast('无法推断下一集地址', 'warning');
                        }
                    } else {
                        showToast(d.message || '无法检测', 'warning');
                    }
                } else {
                    showToast(res.message || '检测失败', 'danger');
                }
            })
            .catch(function() { showToast('请求失败', 'danger'); });
    }

    function downloadVideo(id) {
        var videoUrl = [[${record.videoUrl}]];
        var title = [[${record.title}]];
        if (!videoUrl) { showToast('无视频地址', 'warning'); return; }
        showToast('正在下载...', 'info');
        if (videoUrl.indexOf('.m3u8') > 0) {
            var controller = new AbortController();
            setTimeout(function() { controller.abort(); }, 5000);
            fetch('/api/cache/start?videoUrl=' + encodeURIComponent(videoUrl)
                + '&title=' + encodeURIComponent(title) + '&id=' + id,
                {method:'POST', signal: controller.signal}).catch(function(){});
            window.open('/proxy/m3u8?url=' + encodeURIComponent(videoUrl)
                + '&title=' + encodeURIComponent(title));
        } else {
            window.open(videoUrl);
        }
    }

    function showToast(message, type) {
        const icons = { success:'bi-check-circle-fill', danger:'bi-x-circle-fill', warning:'bi-exclamation-circle-fill', info:'bi-info-circle-fill' };
        const colors = { success:'#16a34a', danger:'#dc2626', warning:'#ca8a04', info:'#3b82f6' };
        const c = colors[type] || '#3b82f6';
        const ic = icons[type] || 'bi-info-circle-fill';
        const id = 't-' + Date.now();
        const html = `<div id="${id}" class="toast toast-custom align-items-center border-0" role="alert">
            <div class="d-flex align-items-center gap-2">
                <i class="bi ${ic}" style="color:${c};font-size:18px;"></i>
                <div class="toast-body" style="padding:0;">${message}</div>
                <button type="button" class="btn-close btn-close-white ms-2" style="font-size:12px;opacity:0.5;" data-bs-dismiss="toast"></button>
            </div>
        </div>`;
        document.getElementById('toastContainer').insertAdjacentHTML('beforeend', html);
        const el = document.getElementById(id);
        new bootstrap.Toast(el, {delay:3000}).show();
        el.addEventListener('hidden.bs.toast', () => el.remove());
    }
</script>
</body>
</html>
