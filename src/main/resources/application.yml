server:
  port: 8080

spring:
  profiles:
    active: mysql
  thymeleaf:
    cache: false
    suffix: .html
    prefix: classpath:/templates/

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.videocollect.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 视频检测超时时间（毫秒）
video:
  check:
    connect-timeout: 5000
    read-timeout: 5000
  fetch:
    user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36
    timeout: 8000
    # 浏览器无头降级路径（可选）。为空则自动探测 Edge → Chrome
    browser-path:

  # yt-dlp 配置（用于解析 B站/YouTube 等 JS 渲染的视频）
  ytdlp:
    path: yt-dlp
    timeout: 30

  # 预设视频源模板（启动时自动加载到 video_source 表）
  source-templates:
    - name: "czltnl"
      homeUrl: "https://www.dongman.com"
      searchUrl: "/api/search?wd={keyword}"
      searchDataPath: "$"
      titleField: "title"
      urlField: "url"
      episodePattern: "(\\d+)-(\\d+)\\.html"
      episodeGroup: 2
    - name: "动漫"
      homeUrl: "https://www.dmdao.com"
      searchUrl: "/search?key={keyword}"
      searchDataPath: "$.data.list"
      titleField: "name"
      urlField: "link"
      episodePattern: "(\\d+)-(\\d+)\\.html"
      episodeGroup: 2

  # HLS 代理缓存配置
  hls:
    cache-dir: ${user.dir}/hls-cache
    prefetch-threads: 5           # 后台预下载 ts 的并发线程数
    playback-prefetch-count: 10   # 播放时额外预取 ts 个数（边播边缓存后续 N 段）
